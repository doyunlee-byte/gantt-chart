<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로젝트 간트차트</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#252838;--border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.18);--text:#f0f2fa;--text2:#b0b7cc;--text3:#7c83a0;--accent:#6b93ff;--green:#3ee8a8;--amber:#e6a800;--red:#ff8080;--blue-bg:#0C447C;--blue-text:#B5D4F4;--blue-avatar:#185FA5;--teal-bg:#085041;--teal-text:#9FE1CB;--teal-avatar:#0F6E56;--teal2-bg:#04342C;--teal2-text:#9FE1CB;--teal2-avatar:#1D9E75;--amber-bg:#633806;--amber-text:#FAC775;--amber-avatar:#854F0B;--purple-bg:#3C3489;--purple-text:#CECBF6;--purple-avatar:#534AB7;--red-bg:#791F1F;--red-text:#F7C1C1;--radius:12px;--radius-sm:8px;}
:root.light{--bg:#f4f6fb;--surface:#fff;--surface2:#edf0f7;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);--text:#1a1d2e;--text2:#4a5068;--text3:#9096b0;--accent:#3b6fe8;--green:#0a9e6a;--amber:#b07800;--red:#d93025;--blue-bg:#E6F1FB;--blue-text:#0C447C;--blue-avatar:#B5D4F4;--teal-bg:#E1F5EE;--teal-text:#085041;--teal-avatar:#9FE1CB;--teal2-bg:#d0f0e4;--teal2-text:#04342C;--teal2-avatar:#5DCAA5;--amber-bg:#FAEEDA;--amber-text:#633806;--amber-avatar:#FAC775;--purple-bg:#EEEDFE;--purple-text:#3C3489;--purple-avatar:#CECBF6;--red-bg:#FCEBEB;--red-text:#A32D2D;--radius:12px;--radius-sm:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',-apple-system,sans-serif;font-size:13px;background:var(--bg);color:var(--text);min-height:100vh;}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999;}
.spinner{width:34px;height:34px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--accent);animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-size:15px;font-weight:700;}.logo span{color:var(--accent);}
.sync-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);background:var(--surface2);padding:4px 10px;border-radius:20px;border:1px solid var(--border);margin-left:12px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-right{display:flex;align-items:center;gap:8px;}
.nav-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);padding:5px 10px;border-radius:7px;cursor:pointer;font-size:12px;font-family:inherit;}
.nav-btn:hover{background:var(--border2);}
.month-label{font-size:13px;font-weight:600;color:var(--text);min-width:130px;text-align:center;}
.today-btn{background:var(--accent);border:none;color:#fff;padding:5px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;}
.page-tabs{display:flex;gap:4px;margin-left:12px;}
.page-tab{padding:5px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;border:1px solid var(--border2);background:transparent;color:var(--text3);white-space:nowrap;}
.page-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.theme-toggle{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);user-select:none;}
.toggle-track{width:30px;height:16px;border-radius:8px;background:var(--border2);position:relative;transition:background .2s;flex-shrink:0;}
.light .toggle-track{background:var(--accent);}
.toggle-thumb{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left .2s;}
.light .toggle-thumb{left:16px;}
.subbar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 20px;display:flex;align-items:center;gap:6px;flex-wrap:nowrap;flex-shrink:0;overflow-x:auto;}
.subbar-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);cursor:pointer;font-size:11px;font-weight:500;color:var(--text2);background:transparent;user-select:none;}
.chip input{display:none;}
.chip .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.chip.on{color:var(--text);}
.metrics-row{display:flex;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--border);gap:1px;}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);flex:1;}
.metric{background:var(--surface);padding:8px 14px;overflow:hidden;}
.metric-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.metric-value{font-size:18px;font-weight:700;color:var(--text);line-height:1;}
.metric-sub{font-size:10px;color:var(--text2);margin-top:2px;}
.metric-badge{display:inline-block;font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;margin-top:3px;}
.badge-green{background:rgba(62,232,168,.15);color:var(--green);}
.badge-red{background:rgba(255,128,128,.15);color:var(--red);}
.badge-amber{background:rgba(230,168,0,.15);color:var(--amber);}
.center-panel{background:var(--surface);border-left:1px solid var(--border2);padding:6px 14px;min-width:420px;flex-shrink:0;}
.center-panel-title{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.center-table{width:100%;border-collapse:collapse;}
.center-table tr{border-bottom:1px solid var(--border);}
.center-table tr:last-child{border-bottom:none;}
.center-table td{padding:2px 5px;font-size:11px;vertical-align:middle;}
.ct-name{color:var(--text2);font-weight:600;}
.ct-input{width:44px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:inherit;font-size:11px;font-weight:700;border-radius:5px;padding:2px 4px;text-align:center;outline:none;}
.ct-unit{font-size:9px;color:var(--text3);margin-left:2px;}
.ct-ok{color:var(--green);font-size:10px;font-weight:700;}
.ct-warn{color:var(--red);font-size:10px;font-weight:700;}
.ct-neutral{color:var(--text3);font-size:10px;}
.gantt-area{flex:1;overflow:auto;}
table{border-collapse:collapse;min-width:100%;}
thead{position:sticky;top:0;z-index:10;}
thead tr th{background:var(--surface);border-bottom:1px solid var(--border2);border-right:1px solid var(--border);padding:0;white-space:nowrap;font-size:10px;font-weight:500;color:var(--text2);text-align:center;}
th.info-th{text-align:left;padding:8px 10px;min-width:150px;width:150px;position:sticky;left:0;z-index:11;background:var(--surface);border-right:1px solid var(--border2);}
th.day-th{min-width:36px;width:36px;padding:3px 2px 4px;}
th.day-th.today-col{background:rgba(107,147,255,.12);}
th.day-th.today-col .dnum{color:var(--accent);}
th.day-th.weekend{background:rgba(255,255,255,.02);}
.light th.day-th.weekend{background:rgba(0,0,0,.02);}
tbody tr{border-bottom:1px solid var(--border);}
td.info-td{padding:5px 8px;vertical-align:middle;min-width:150px;width:150px;position:sticky;left:0;z-index:5;background:var(--bg);border-right:1px solid var(--border2);white-space:nowrap;overflow:hidden;}
tbody tr:hover td.info-td{background:var(--surface2);}
td.day-td{min-width:36px;width:36px;padding:2px;border-right:1px solid var(--border);vertical-align:middle;text-align:center;}
td.day-td.weekend{background:rgba(255,255,255,.01);}
td.day-td.week-start{border-left:2px solid rgba(255,255,255,.15)!important;}
.light td.day-td.week-start{border-left:2px solid rgba(0,0,0,.15)!important;}
td.day-td.cur-week{background:rgba(107,147,255,.04)!important;}
.status-tag{display:inline-block;font-size:8px;font-weight:600;padding:1px 5px;border-radius:3px;margin-top:2px;}
.s-done{background:rgba(62,232,168,.15);color:var(--green);}
.s-prog{background:rgba(107,147,255,.15);color:var(--accent);}
.s-wait{background:rgba(176,183,204,.12);color:var(--text2);}
.s-fail{background:rgba(255,128,128,.15);color:var(--red);}
.deadline-line{width:2px;height:28px;border-radius:1px;background:var(--red);margin:0 auto;}
.today-line{width:1.5px;height:28px;border-radius:1px;background:var(--accent);margin:0 auto;opacity:.6;}
.legend{background:var(--surface);border-top:1px solid var(--border);padding:5px 20px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;flex-shrink:0;font-size:10px;color:var(--text3);}
/* 포캐스팅 페이지 */
.fc-page{flex:1;overflow-y:auto;padding:16px 20px;display:none;flex-direction:column;gap:14px;}
.fc-page.show{display:flex;}
.fc-section-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.fc-section-title::after{content:'';flex:1;height:1px;background:var(--border2);}
.fc-center-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.fc-card{border-radius:10px;padding:14px 16px;border:2px solid rgba(0,0,0,.2);background:var(--surface);transition:all .2s;}
.fc-card.fixed{border-color:#059669;background:rgba(5,150,105,.07);}
.fc-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.fc-card-name{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:800;color:var(--text);}
.fc-fixed-badge{font-size:9px;background:#05966920;color:#059669;padding:2px 7px;border-radius:4px;font-weight:700;}
.fc-proj-block{border-top:1px solid var(--border);padding:8px 0;margin-top:6px;}
.fc-proj-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.fc-inputs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.fc-input-box{background:var(--surface2);border-radius:6px;padding:5px 8px;}
.fc-input-box-title{font-size:8px;color:var(--text3);margin-bottom:3px;}
.fc-input-row{display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.fc-num{width:34px;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:inherit;font-size:11px;font-weight:700;border-radius:4px;padding:2px 3px;text-align:center;outline:none;}
.fc-num:focus{border-color:var(--accent);}
.fc-unit{font-size:9px;color:var(--text3);}
.fc-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
/* 종합평가 카드 */
.fc-summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.fcs-card{border-radius:10px;overflow:hidden;border:2px solid #e5e7eb;}
.fcs-card-head{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e5e7eb;}
.fcs-card-body{padding:8px 14px;}
.fcs-proj-row{display:flex;gap:5px;margin-top:6px;padding-top:6px;border-top:1px solid #e5e7eb;}
/* PPT 캡처 페이지 */
.cap-page{flex:1;overflow-y:auto;padding:10px 14px;display:none;flex-direction:column;gap:0;background:#edf0f7;}
.cap-page.show{display:flex;}
.cap-section{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.cap-title{font-size:18px;font-weight:800;color:#1a1d2e;margin-bottom:4px;}
.cap-date{font-size:11px;color:#9096b0;margin-bottom:14px;}

  

  

  @media (prefers-color-scheme: dark) {
    
  }

  

  .board-page .board-container { max-width: 1440px; margin: 0 auto; }

  .page-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 1.75rem;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; }
  .page-sub { font-size: 13px; color: var(--text2); margin-top: 3px; }

  .ai-box {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 1.75rem;
  }

  .ai-box-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  .ai-input-row { display: flex; gap: 8px; align-items: flex-end; }

  .ai-input-row textarea {
    flex: 1;
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    resize: none;
    min-height: 40px;
    max-height: 120px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.15s;
  }

  .ai-input-row textarea:focus { border-color: rgba(56,138,221,0.5); }

  .ai-send-btn {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
    font-family: inherit;
  }

  .ai-send-btn:hover { opacity: 0.8; }

  .ai-status {
    font-size: 12px;
    color: var(--text3);
    margin-top: 6px;
    min-height: 18px;
  }

  .ai-hint {
    font-size: 11.5px;
    color: var(--text3);
    margin-top: 8px;
    line-height: 1.6;
  }

  .ai-hint span {
    display: inline-block;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    margin: 1px 2px;
    color: var(--text2);
  }

  .date-row {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0.85rem 1.25rem;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .date-row label { font-size: 13px; color: var(--text2); white-space: nowrap; }

  .date-row input[type="date"] {
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 5px 10px;
    cursor: pointer;
    outline: none;
  }

  .date-clear {
    font-size: 12px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    padding: 0;
    margin-left: auto;
  }

  .board-page #projects-container { display: flex; flex-direction: column; gap: 1.25rem; }

  .project-section {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 1.25rem 1.25rem 1rem;
    animation: fadeIn 0.3s ease;
  }

  .project-section.is-default {
    background: #1d1a10;
    border-color: rgba(250, 199, 117, 0.22);
  }
  :root.light .project-section.is-default {
    background: #FFFDF7;
    border-color: rgba(180, 140, 50, 0.35);
  }

  .default-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    background: var(--amber-bg);
    color: var(--amber-text);
    border-radius: 20px;
    padding: 2px 8px;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .project-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .project-name { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }

  .project-period {
    font-size: 12px;
    color: var(--text2);
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
  }

  .project-delete {
    margin-left: auto;
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text3);
    font-size: 12px;
    padding: 3px 10px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .project-delete:hover { border-color: var(--red-text); color: var(--red-text); }

  .dept-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  @media (max-width: 1000px) { .dept-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px)  { .dept-grid { grid-template-columns: 1fr; } }

  .dept-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .dept-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.65rem 0.9rem;
    border-bottom: 0.5px solid var(--border);
    flex-wrap: wrap;
    gap: 4px;
  }

  .dept-name-wrap { display: flex; align-items: center; gap: 8px; }

  .dept-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
  }

  .dept-name-text { font-size: 14px; font-weight: 500; }

  .deadline-wrap { display: flex; align-items: center; gap: 6px; }
  .d-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .d-date { font-size: 11px; color: var(--text3); }
  .d-remain { font-size: 11px; font-weight: 500; }

  .dept-tasks { padding: 0.6rem 0.9rem; }

  .task-item {
    display: flex; gap: 8px;
    padding: 5px 0;
    border-bottom: 0.5px solid var(--border);
    font-size: 12.5px;
    line-height: 1.5;
  }

  .task-item:last-child { border-bottom: none; }
  .task-num { color: var(--text3); min-width: 16px; padding-top: 1px; font-size: 11px; }

  .task-check {
    width: 14px; height: 14px;
    flex-shrink: 0;
    margin-top: 3px;
    cursor: pointer;
    accent-color: #1A6B35;
  }

  .task-item.is-done .task-body {
    opacity: 0.38;
    text-decoration: line-through;
    text-decoration-color: var(--text3);
  }

  .done-badge {
    display: none;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    background: #D4EDDA;
    color: #1A6B35;
    border-radius: 20px;
    padding: 2px 9px;
    align-items: center;
  }

  .dept-card.all-done .dept-header { background: #152A1D; }
  .dept-card.all-done .done-badge  { display: inline-flex; }
  .dept-card.all-done .d-remain    { display: none; }

  .done-badge { background: #1A3D25; color: #7ED99A; }
  :root.light .done-badge { background: #D4EDDA; color: #1A6B35; }
  :root.light .dept-card.all-done .dept-header { background: #EDF7EF; }

  .task-body { flex: 1; color: var(--text); }
  .task-note { font-size: 11.5px; color: var(--text2); display: block; margin-top: 2px; }

  .dept-persons {
    display: flex; flex-wrap: wrap; gap: 5px;
    padding: 0.55rem 0.9rem;
    border-top: 0.5px solid var(--border);
    background: var(--surface2);
  }

  .person-divider {
    font-size: 10px;
    color: var(--text3);
    width: 100%;
    padding: 2px 0 1px;
    display: flex; align-items: center; gap: 5px;
    letter-spacing: 0.04em;
  }

  .person-divider::after { content:''; flex:1; height: 0.5px; background: var(--border2); }

  .dev-tabs {
    display: flex;
    gap: 6px;
    padding: 0.65rem 0.9rem;
    border-bottom: 0.5px solid var(--border);
  }

  .dev-tab-item {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
  }

  .dev-tab-item.is-done .dev-tab {
    text-decoration: line-through;
    opacity: 0.45;
  }

  .dev-tab {
    flex: 1;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 500;
    padding: 7px 0;
    border-radius: var(--radius-sm);

  .sum-date-cell.today { background: rgba(99,102,241,.08); color: var(--accent); font-weight: 700; }

  .sum-row-label.proj { font-size: 12px; font-weight: 700; color: var(--text); }
  .sum-row-label.center { font-size: 11px; font-weight: 500; color: var(--text2); padding-left: 24px; }
  .sum-toggle { font-size: 10px; color: var(--text3); transition: transform .2s; display: inline-block; }
  .sum-toggle.open { transform: rotate(90deg); }
  .sum-cells { display: flex; flex: 1; position: relative; align-items: center; min-height: 36px; }
  .sum-gantt-bar { position: absolute; height: 14px; border-radius: 3px; opacity: .85; top: 50%; transform: translateY(-100%); z-index: 2; }
  .sum-progress-bar { position: absolute; height: 8px; border-radius: 3px; bottom: 4px; z-index: 3; }
  .sum-cell-bg { min-width: 28px; width: 28px; flex-shrink: 0; height: 100%; border-right: 1px solid var(--border); }
  .sum-cell-bg.today { background: rgba(99,102,241,.06); }
  .sum-cell-bg.weekend { background: var(--surface2); opacity: .5; }
  .sum-gauge-wrap { position: absolute; left: 0; right: 0; top: 0; bottom: 0; display: flex; align-items: center; padding: 4px 2px; }
  .sum-gauge-track { flex: 1; height: 10px; background: var(--border2); border-radius: 5px; overflow: hidden; position: relative; }
  .sum-gauge-fill { height: 100%; border-radius: 5px; transition: width .3s; }
  .sum-pending { font-size: 10px; color: var(--text3); font-style: italic; padding: 0 8px; }
  .sum-month-header { display: flex; position: sticky; top: 0; z-index: 9; }
  .sum-month-cell { text-align: center; font-size: 10px; font-weight: 700; color: var(--text2); padding: 3px 0; border-right: 1px solid var(--border2); border-bottom: 1px solid var(--border); background: var(--surface); }

<script>
// ── 설정
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyiWJo2u3zvkQnl7L5VOUk6CyeFkEvFxD95AfuFdOtpVwVJkubQi_q6O6oDHHkSkcHY/exec';

const CSV_CAPABILITY = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTryPQXfM3PqFsJ5jjXq4Fd3crnxaYQcmWLhjpgj2lXp9yjDIO36pJYdCdCMCVfs_2u8XAd3-RPUhIL/pub?gid=1234030367&single=true&output=csv';
const RAW_CSVS = {
  '빽다방':  'https://docs.google.com/spreadsheets/d/e/2PACX-1vTryPQXfM3PqFsJ5jjXq4Fd3crnxaYQcmWLhjpgj2lXp9yjDIO36pJYdCdCMCVfs_2u8XAd3-RPUhIL/pub?gid=1302096212&single=true&output=csv',
  '토스캠':  'https://docs.google.com/spreadsheets/d/e/2PACX-1vTryPQXfM3PqFsJ5jjXq4Fd3crnxaYQcmWLhjpgj2lXp9yjDIO36pJYdCdCMCVfs_2u8XAd3-RPUhIL/pub?gid=1804432973&single=true&output=csv',
  '왓더버거':'https://docs.google.com/spreadsheets/d/e/2PACX-1vTryPQXfM3PqFsJ5jjXq4Fd3crnxaYQcmWLhjpgj2lXp9yjDIO36pJYdCdCMCVfs_2u8XAd3-RPUhIL/pub?gid=1774731730&single=true&output=csv',
  '와플대학':'https://docs.google.com/spreadsheets/d/e/2PACX-1vTryPQXfM3PqFsJ5jjXq4Fd3crnxaYQcmWLhjpgj2lXp9yjDIO36pJYdCdCMCVfs_2u8XAd3-RPUhIL/pub?gid=422747828&single=true&output=csv',
};
const GID_TAB = {'0':'종합','1234030367':'역량분석','1302096212':'빽다방','1804432973':'토스캠','1774731730':'왓더버거','422747828':'와플대학'};

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
let BASE_RATE = 1.6;
let viewYear = TODAY.getFullYear(), viewMonth = TODAY.getMonth();

const KR_HOL = new Set(['2025-01-01','2025-01-28','2025-01-29','2025-01-30','2025-03-01','2025-05-05','2025-06-06','2025-08-15','2025-10-03','2025-10-09','2025-12-25','2026-01-01','2026-01-28','2026-01-29','2026-01-30','2026-03-01','2026-03-02','2026-05-05','2026-05-25','2026-06-06','2026-08-17','2026-09-24','2026-09-25','2026-09-26','2026-10-03','2026-10-09','2026-12-25']);
const PROJ_COLORS=[{color:'#f5c518',bg:'rgba(245,197,24,.15)',tc:'#a07800'},{color:'#4f7cff',bg:'rgba(79,124,255,.15)',tc:'#2d5fd4'},{color:'#e05c6b',bg:'rgba(224,92,107,.15)',tc:'#c0394a'},{color:'#34d399',bg:'rgba(52,211,153,.15)',tc:'#059669'},{color:'#f472b6',bg:'rgba(244,114,182,.15)',tc:'#be185d'},{color:'#22d3ee',bg:'rgba(34,211,238,.15)',tc:'#0891b2'},{color:'#a78bfa',bg:'rgba(167,139,250,.15)',tc:'#7c3aed'},{color:'#fb923c',bg:'rgba(251,146,60,.15)',tc:'#c2410c'}];
const CENTERS=[{name:'비버경인',color:'#6b93ff'},{name:'비버성남',color:'#3ee8a8'},{name:'비버광주',color:'#fdd05a'},{name:'비버대구',color:'#f472b6'},{name:'비버대전',color:'#a78bfa'},{name:'비버부산',color:'#38e2ff'}];
const DOWS=['일','월','화','수','목','금','토'];

let PROJECTS=[], selected=new Set(), DAILY_MAP={}, CENTER_REMAIN={}, CENTER_DAILY={};
const projCenterSettings={}, fcFixMap={};
const fcSelectedProjects=new Set();

// ── 유틸
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function isOff(d){const dw=d.getDay();return dw===0||dw===6||KR_HOL.has(fmt(d));}
function networkDays(a,b){let n=0,c=new Date(a);while(c<=b){if(!isOff(c))n++;c.setDate(c.getDate()+1);}return n;}
function addWorkDays(s,n){let c=new Date(s),a=0;while(a<n){c.setDate(c.getDate()+1);if(!isOff(c))a++;}return c;}
function isLight(){return document.documentElement.classList.contains('light');}
function blockTC(){return isLight()?'#1a1d2e':'#fff';}

function pd(s){
  if(!s||!s.trim())return null;
  s=s.trim();
  const m1=s.match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})/);
  if(m1)s=`${m1[1]}-${m1[2].padStart(2,'0')}-${m1[3].padStart(2,'0')}`;
  const m2=s.match(/\w+ (\w+) (\d{2}) (\d{4})/);
  if(m2){const mo={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};s=`${m2[3]}-${mo[m2[1]]||'01'}-${m2[2]}`;}
  const d=new Date(s+'T00:00:00');
  return isNaN(d)?null:(d.setHours(0,0,0,0),d);
}

// 센터 레벨 설정 { centerName: { totalPersonnel: N, mode: 'sequential'|'parallel' } }
const centerLevelSettings = {};
function getCLS(cn){
  if(!centerLevelSettings[cn])centerLevelSettings[cn]={totalPersonnel:2,mode:'sequential',projOrder:{}};
  if(!centerLevelSettings[cn].projOrder)centerLevelSettings[cn].projOrder={};
  return centerLevelSettings[cn];
}

// 센터의 프로젝트 순서 반환 (순차일 때)
function getProjOrder(cn, selP){
  const cls = getCLS(cn);
  // 순서 미설정 프로젝트는 기본 인덱스 순
  return selP.slice().sort((a,b)=>{
    const oa = cls.projOrder[a.id] ?? 99;
    const ob = cls.projOrder[b.id] ?? 99;
    return oa - ob;
  });
}

function setCLSProjOrder(cn, projId, order){
  const cls = getCLS(cn);
  cls.projOrder[projId] = order;
}

function getPCS(pid,cn){
  if(!projCenterSettings[pid])projCenterSettings[pid]={};
  if(!projCenterSettings[pid][cn])projCenterSettings[pid][cn]={planPersonnel:2,planDaily:4,realPersonnel:2,realDaily:4};
  return projCenterSettings[pid][cn];
}
function getCRem(cn,p){if(!p||!CENTER_REMAIN[p.name])return 0;return CENTER_REMAIN[p.name][cn]||0;}

// ── CSV 로드
async function fetchCSV(url){
  const gid=(url.match(/gid=(\d+)/)||['','0'])[1];
  const tab=GID_TAB[gid]||'종합';
  // Apps Script 먼저
  try{
    const r=await fetch(`${APPS_SCRIPT_URL}?tab=${encodeURIComponent(tab)}`);
    if(r.ok){const t=await r.text();if(t&&t.length>10)return t;}
  }catch(e){}
  // 직접
  try{const r=await fetch(url);if(r.ok)return await r.text();}catch(e){}
  // 프록시
  try{const r=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);if(r.ok)return await r.text();}catch(e){}
  return null;
}

function parseCSV(txt){
  if(!txt)return[];
  const lines=txt.trim().split('\n');
  const hdrs=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
  return lines.slice(1).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(const c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=c;}
    vals.push(cur.trim());
    const obj={};hdrs.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/"/g,'').trim());
    return obj;
  });
}

async function buildDailyMap(pname,url){
  const txt=await fetchCSV(url);
  if(!txt){DAILY_MAP[pname]={};CENTER_DAILY[pname]={};return;}
  const lines=txt.trim().split('\n').slice(1);
  const map={},cmap={},cdaily={};
  const cnames=CENTERS.map(c=>c.name);
  lines.forEach(line=>{
    const cols=[];let cur='',inQ=false;
    for(const c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=c;}
    cols.push(cur.trim());
    const cn=(cols[1]||'').replace(/"/g,'').trim();
    const st=(cols[2]||'').replace(/"/g,'').trim();
    const dr=(cols[3]||'').replace(/"/g,'').trim();
    if(cnames.includes(cn)){
      if(!cmap[cn])cmap[cn]={total:0,done:0};
      cmap[cn].total++;
      if(st==='설치 완료'||st==='완료'){
        cmap[cn].done++;
        if(dr){const d=new Date(dr);if(!isNaN(d)){d.setHours(0,0,0,0);const k=fmt(d);if(!cdaily[cn])cdaily[cn]={};cdaily[cn][k]=(cdaily[cn][k]||0)+1;}}
      }
    }
    if(!dr)return;
    const d2=new Date(dr);if(isNaN(d2))return;
    d2.setHours(0,0,0,0);
    const k2=fmt(d2);map[k2]=(map[k2]||0)+1;
  });
  DAILY_MAP[pname]=map;CENTER_DAILY[pname]=cdaily;
  if(!CENTER_REMAIN[pname])CENTER_REMAIN[pname]={};
  Object.entries(cmap).forEach(([cn,v])=>CENTER_REMAIN[pname][cn]=Math.max(0,v.total-v.done));
}

// ── 데이터 로드
async function loadData(){
  const setT=t=>{const el=document.getElementById('loadTxt');if(el)el.textContent=t;};
  setT('종합 데이터 불러오는 중...');
  const sumTxt=await fetchCSV(CSV_SUMMARY);
  if(!sumTxt){setT('데이터 로드 실패 - 구글 시트 공개 설정을 확인해주세요');return;}
  setT('raw 데이터 불러오는 중...');
  await Promise.allSettled(Object.entries(RAW_CSVS).map(([n,u])=>buildDailyMap(n,u)));
  const rows=parseCSV(sumTxt).filter(r=>r['프로젝트']&&r['프로젝트'].trim());
  const pm={};rows.forEach(r=>{const p=r['프로젝트'];if(!pm[p])pm[p]=[];pm[p].push(r);});
  PROJECTS=Object.entries(pm).map(([name,tasks],i)=>{
    const c=PROJ_COLORS[i%PROJ_COLORS.length];
    return{id:'P'+i,name,color:c.color,bg:c.bg,tc:c.tc,
      projStart:pd(tasks[0]['프로젝트_시작일']),projEnd:pd(tasks[0]['프로젝트_마감일']),
      tasks:tasks.map(t=>({task:t['태스크']||'',team:t['팀명']||'',start:pd(t['시작일']),deadline:pd(t['마감일']||t['종료일']),total:parseInt(t['전체매장']||'0')||0,done:parseInt(t['완료매장']||'0')||0,status:t['상태']||''}))};
  });
  selected=new Set(PROJECTS.map(p=>p.id));
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  updateMobDate();
  loadSettings(); // async - 시트에서 설정 로드
  renderAll();
  switchPage('fc'); // 포캐스팅 탭을 기본으로
}

// ── 페이지 전환
function switchPage(page){
  const isMobile = window.innerWidth <= 768;
  // 모바일에서는 포캐스팅Summary(cap)만 기본으로, fc/board/gantt 접근 차단
  if(isMobile && (page==='fc'||page==='board'||page==='gantt')) page='cap';
  document.getElementById('pageGantt').style.display=page==='gantt'?'flex':'none';
  document.getElementById('pageFc').classList.toggle('show',page==='fc');
  document.getElementById('pageCap').classList.toggle('show',page==='cap');
  document.getElementById('pageBoard').style.display=page==='board'?'flex':'none';
  document.getElementById('pageSummary').style.display=page==='summary'?'flex':'none';
  ['tabGantt','tabFc','tabCap','tabBoard','tabSummary'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById({gantt:'tabGantt',fc:'tabFc',cap:'tabCap',board:'tabBoard',summary:'tabSummary'}[page]).classList.add('active');
  // 모바일 하단 탭바 활성 탭 갱신
  ['mobTabCap','mobTabSummary'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('active');});
  if(page==='cap'){const el=document.getElementById('mobTabCap');if(el)el.classList.add('active');}
  if(page==='summary'){const el=document.getElementById('mobTabSummary');if(el)el.classList.add('active');}
  if(page==='fc'){if(!fcSelectedProjects.size&&PROJECTS.length)fcSelectedProjects.add(PROJECTS[0].id);renderFcPage();}
  if(page==='cap'){
    if(window.innerWidth<=768&&summarySelectedProjs.size>0){fcSelectedProjects.clear();summarySelectedProjs.forEach(id=>fcSelectedProjects.add(id));}
    if(!fcSelectedProjects.size&&PROJECTS.length)PROJECTS.forEach(p=>fcSelectedProjects.add(p.id));
    renderCapPage();
  }
  if(page==='board'){loadBoardData();}
  if(page==='summary'){
    if(window.innerWidth<=768&&fcSelectedProjects.size>0){summarySelectedProjs.clear();fcSelectedProjects.forEach(id=>summarySelectedProjs.add(id));}
    renderSummaryPage();
  }
}

function goToday(){viewYear=TODAY.getFullYear();viewMonth=TODAY.getMonth();renderAll();if(document.getElementById('pageSummary').style.display!=='none')renderSummaryPage();}

// ── 테마
function toggleTheme(){
  const il=document.documentElement.classList.toggle('light');
  document.getElementById('themeIcon').textContent=il?'☀️':'🌙';
  try{localStorage.setItem('ganttTheme',il?'light':'dark');}catch(e){}
  renderAll();
}
(function(){try{if(localStorage.getItem('ganttTheme')==='light'){document.documentElement.classList.add('light');setTimeout(()=>{const i=document.getElementById('themeIcon');if(i)i.textContent='☀️';},50);}}catch(e){}})();

// ── 간트 렌더링
function renderAll(){renderChips();renderMetrics();renderCenterPanel();renderTable();}

function renderChips(){
  const area=document.getElementById('chipArea');area.innerHTML='';
  PROJECTS.forEach(p=>{
    const l=document.createElement('label');
    l.className='chip'+(selected.has(p.id)?' on':'');
    if(selected.has(p.id)){l.style.borderColor=p.color;l.style.background=p.bg;l.style.color=p.tc;}
    l.innerHTML=`<input type="checkbox" ${selected.has(p.id)?'checked':''}><span class="dot" style="background:${p.color}"></span>${p.name}`;
    l.querySelector('input').addEventListener('change',e=>{if(e.target.checked)selected.add(p.id);else selected.delete(p.id);renderAll();});
    area.appendChild(l);
  });
}

function renderMetrics(){
  const vp=PROJECTS.filter(p=>selected.has(p.id));
  const allT=vp.flatMap(p=>p.tasks);
  const tot=allT.reduce((s,t)=>s+t.total,0),don=allT.reduce((s,t)=>s+t.done,0);
  const pct=tot>0?Math.round(don/tot*100):0;
  const delayed=allT.filter(t=>{if(t.status==='완료')return false;const rem=Math.max(0,t.total-t.done);if(!rem||!t.deadline)return false;const d=Math.max(1,networkDays(TODAY,t.deadline));const fc=addWorkDays(TODAY,Math.ceil(rem/(BASE_RATE*3)));return fc>t.deadline;}).length;
  const vc=isLight()?'#1a1d2e':'#fff';
  document.getElementById('metricArea').innerHTML=`
    <div class="metric"><div class="metric-label">전체 진척도</div><div class="metric-value" style="color:${vc}">${pct}%</div><div class="metric-sub">${don.toLocaleString()} / ${tot.toLocaleString()} 매장</div></div>
    <div class="metric"><div class="metric-label">활성 프로젝트</div><div class="metric-value" style="color:${vc}">${vp.length}</div><div class="metric-sub">총 ${allT.length}개 태스크</div></div>
    <div class="metric"><div class="metric-label">역량 기준</div><div class="metric-value" style="color:${vc}">${BASE_RATE.toFixed(1)}</div><div class="metric-sub">빽다방 실적 (팀/일)</div><div class="metric-badge badge-amber">자동 연동</div></div>
    <div class="metric"><div class="metric-label">지연 위험</div><div class="metric-value" style="color:${vc}">${delayed}</div><div class="metric-badge ${delayed>0?'badge-red':'badge-green'}">${delayed>0?'주의 필요':'정상'}</div></div>
    <div class="metric"><div class="metric-label">잔여 매장</div><div class="metric-value" style="color:${vc}">${(tot-don).toLocaleString()}</div><div class="metric-sub">전체 미완료</div></div>
    <div class="metric" style="padding:6px 10px;min-width:260px;">
      <div class="metric-label" style="margin-bottom:6px;">프로젝트별 잔여</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 12px;">
        ${vp.map(p=>{const rem=p.tasks.reduce((s,t)=>s+Math.max(0,t.total-t.done),0);return`<div style="display:flex;align-items:center;justify-content:space-between;gap:4px;"><span style="display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text2);min-width:0;"><span style="width:5px;height:5px;border-radius:50%;background:${p.color};flex-shrink:0;display:inline-block;"></span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name}</span></span><span style="font-size:10px;font-weight:700;color:${rem===0?'var(--green)':vc};white-space:nowrap;">${rem.toLocaleString()}</span></div>`;}).join('')}
      </div>
      <div style="border-top:1px solid var(--border);margin-top:5px;padding-top:4px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:9px;color:var(--text3);">합계</span><span style="font-size:12px;font-weight:800;color:${vc};">${(tot-don).toLocaleString()}개</span></div>
    </div>`;
}

function renderCenterPanel(){
  const vp=PROJECTS.filter(p=>selected.has(p.id));
  const selId=vp.length===1?vp[0].id:null;
  let rows='';
  const half=Math.ceil(CENTERS.length/2);
  function buildRow(c){
    if(!c)return'<td colspan="3"></td>';
    const s=selId?getPCS(selId,c.name):{realPersonnel:2,realDaily:4};
    const personnel=s.realPersonnel||0;
    const cRem=selId?getCRem(c.name,vp[0]):0;
    const remD=selId&&vp[0].projEnd?Math.max(1,networkDays(TODAY,vp[0].projEnd)):30;
    const cDone=PROJECTS.filter(p=>selected.has(p.id)).reduce((s2,p)=>s2+Object.values(CENTER_DAILY[p.name]?.[c.name]||{}).reduce((a,b)=>a+b,0),0);
    const cTotal=cDone+cRem;const cpct=cTotal>0?Math.round(cDone/cTotal*100):0;
    let res='';
    if(!selId)res=`<span class="ct-neutral">-</span>`;
    else if(cRem===0)res=`<span class="ct-ok">✅완료</span>`;
    else if(personnel===0)res=`<span class="ct-neutral">미배정</span>`;
    else{const fcD=Math.ceil(cRem/(2*personnel));const dE=remD-fcD;
      if(dE>0)res=`<span class="ct-ok">✅${dE}일 조기</span>`;
      else if(dE===0)res=`<span class="ct-ok">✅딱맞춤</span>`;
      else res=`<span class="ct-warn">⚠️${Math.abs(dE)}일 지연</span>`;
    }
    return`<td style="padding:2px 4px;"><span style="display:flex;align-items:center;gap:4px;"><span style="width:5px;height:5px;border-radius:50%;background:${c.color};display:inline-block;"></span><span class="ct-name">${c.name}</span></span></td>
    <td><input type="number" class="ct-input" min="0" max="20" value="${personnel}" data-center="${c.name}" onchange="updateCenterPersonnel(this)"><span class="ct-unit">명</span></td>
    <td>${res}${cpct>0?`<span style="font-size:9px;color:${c.color};margin-left:3px;">${cpct}%</span>`:''}</td>`;
  }
  for(let i=0;i<half;i++)rows+=`<tr>${buildRow(CENTERS[i])}${buildRow(CENTERS[i+half]||null)}</tr>`;
  document.getElementById('centerTable').innerHTML=rows;
}

function updateCenterPersonnel(input){
  const name=input.getAttribute('data-center');
  const val=Math.max(0,parseInt(input.value)||0);input.value=val;
  const vp=PROJECTS.filter(p=>selected.has(p.id));
  if(vp.length===1)getPCS(vp[0].id,name).realPersonnel=val;
  renderCenterPanel();
}

function getAllDays(){
  const days=[];
  for(let mo=0;mo<2;mo++){
    let cy=viewYear,cm=viewMonth+mo;
    if(cm>11){cy++;cm-=12;}
    const dim=new Date(cy,cm+1,0).getDate();
    for(let d=1;d<=dim;d++)days.push(new Date(cy,cm,d));
  }
  return days;
}

// 포캐스팅 예상완료일 (픽스 센터 기준 가장 늦은 날짜)
function getProjFcDate(p){
  let latest=null;
  CENTERS.forEach(c=>{
    if(!fcFixMap[p.id+'_'+c.name])return;
    const s=getPCS(p.id,c.name);const cRem=getCRem(c.name,p);
    if(cRem<=0)return;
    const fd=s.realDaily>0?addWorkDays(TODAY,Math.ceil(cRem/s.realDaily)):null;
    if(fd&&(!latest||fd>latest))latest=fd;
  });
  return latest;
}

// 실적 기반 예상완료일
function getProjActualFcDate(p){
  const start=p.projStart||TODAY;
  const wdE=Math.max(1,networkDays(start,TODAY));
  const totDone=Object.values(DAILY_MAP[p.name]||{}).reduce((a,b)=>a+b,0);
  if(!totDone)return null;
  const avg=totDone/wdE;
  const totS=p.tasks.reduce((s,t)=>s+t.total,0);
  const donS=p.tasks.reduce((s,t)=>s+t.done,0);
  const rem=Math.max(0,totS-donS);
  if(!rem)return TODAY;
  return addWorkDays(TODAY,Math.ceil(rem/avg));
}

function calcProjStatus(p,c){
  const s=getPCS(p.id,c.name);const cRem=getCRem(c.name,p);
  const d=p.projEnd;const rd=s.realDaily||4;
  if(cRem===0)return{label:'완료',color:'#059669',bg:'#f0fdf4',border:'#059669',detail:'설치 완료',fcDate:null};
  const fcD=rd>0?Math.ceil(cRem/rd):999;
  const fd=fcD<999?addWorkDays(TODAY,fcD):null;
  // 예상완료일과 마감일 사이 평일 차이 (양수=여유, 음수=초과)
  const remWD=d?Math.max(0,networkDays(TODAY,d)):0;
  const dd=d&&fd?(fd<=d?networkDays(fd,d):-networkDays(d,fd)):null;
  const onTime=d&&fd&&fd<=d;
  const short=Math.max(0,Math.ceil(Math.ceil(cRem/Math.max(1,remWD))/2)-(s.realPersonnel||0));
  let label,color,bg,border,detail;
  if(!fd){label='확인필요';color='#9096b0';bg='#f8fafc';border='#e5e7eb';detail='데이터 없음';}
  else if(!onTime){label='🔴 위험';color='#dc2626';bg='#fef2f2';border='#dc2626';detail=`${fd.getMonth()+1}/${fd.getDate()} 예상 · 마감 ${Math.abs(dd)}일 초과${short>0?` · ${short}명 필요`:''}`;}
  else if(dd<=2){label='⚡ 주의';color='#f59e0b';bg='#fffbeb';border='#f59e0b';detail=`${fd.getMonth()+1}/${fd.getDate()} 예상 · ${dd}일 여유 (빠듯)${short>0?` · ${short+1}명 권장`:''}`;}
  else if(dd<=5){label='⚡ 주의';color='#f59e0b';bg='#fffbeb';border='#f59e0b';detail=`${fd.getMonth()+1}/${fd.getDate()} 예상 · ${dd}일 여유`;}
  else{label='✅ 충분';color='#059669';bg='#f0fdf4';border='#059669';detail=`${fd.getMonth()+1}/${fd.getDate()} 예상 · ${dd}일 여유`;}
  return{label,color,bg,border,detail,fcDate:fd,daysDiff:dd};
}

function renderFcSummary(selP, targetId){
  const el=document.getElementById(targetId);if(!el)return;
  if(!selP.length){el.innerHTML='';return;}
  let html='';
  CENTERS.forEach(c=>{
    const fixedP=selP.filter(p=>fcFixMap[p.id+'_'+c.name]);
    const noFix=fixedP.length===0;
    let worst={label:'미배정',color:'#9096b0',bg:'#f9fafb',border:'#e5e7eb'};
    let latestFd=null;
    const results=[];
    fixedP.forEach(p=>{
      const st=calcProjStatus(p,c);
      if(st.fcDate&&(!latestFd||st.fcDate>latestFd))latestFd=st.fcDate;
      if(st.label.includes('위험'))worst=st;
      else if(st.label.includes('주의')&&!worst.label.includes('위험'))worst=st;
      else if(st.label==='✅ 충분'&&!worst.label.includes('위험')&&!worst.label.includes('주의'))worst=st;
      results.push({p,st});
    });
    if(noFix)worst={label:'미배정',color:'#9096b0',bg:'#f9fafb',border:'#e5e7eb'};
    const latStr=latestFd?`최종 ${latestFd.getMonth()+1}/${latestFd.getDate()} 완료`:'';
    const rows=noFix?`<div style="font-size:11px;color:#9096b0;padding:6px 0;">픽스된 프로젝트 없음</div>`:
      results.map(({p,st})=>`<div style="display:flex;gap:5px;margin-top:6px;padding-top:6px;border-top:1px solid #e5e7eb;">
        <span style="width:5px;height:5px;border-radius:50%;background:${p.color};flex-shrink:0;margin-top:4px;display:inline-block;"></span>
        <div><span style="font-size:11px;font-weight:700;color:#1a1d2e;">${p.name}</span>

function updateCLS(input, field){
  const cn = input.getAttribute('data-center');
  const val = field==='totalPersonnel' ? Math.max(1, parseInt(input.value)||1) : input.value;
  getCLS(cn)[field] = val;
  saveSettings();
  renderFcPage();
  renderCapPage();
}

function toggleCLSMode(cn){
  const cls = getCLS(cn);
  cls.mode = cls.mode==='sequential'?'parallel':'sequential';
  renderFcPage();
  renderCapPage();
}

// ── toast / sync 상태 유틸
let _toastTimer = null;
function showToast(msg, dur = 2500) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

function _setSyncBadge(state) {
  const el = document.getElementById('syncBadgeStatus');
  if (!el) return;
  const map = {
    loading: { dot: '#e6a800', text: '동기화 중…' },
    ok:      { dot: 'var(--green)', text: '시트 연동' },
    warn:    { dot: '#e6a800', text: '빈 설정' },
    error:   { dot: 'var(--red)', text: '시트 오류' },
  };
  const s = map[state] || map.ok;
  el.querySelector('.sync-dot').style.background = s.dot;
  el.querySelector('span').textContent = s.text;
}

// ── 설정 저장/로드 (구글 시트 연동)
let _saveTimer = null;

function saveSettings(){
  // localStorage에도 저장 (빠른 응답용)
  try{
    localStorage.setItem('ganttCLS', JSON.stringify(centerLevelSettings));
    localStorage.setItem('ganttFix', JSON.stringify(fcFixMap));
    localStorage.setItem('ganttPCS', JSON.stringify(projCenterSettings));
  }catch(e){}
  // 구글 시트에 저장 (디바운스 1초)
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(()=>saveToSheet(), 1000);
}

async function saveToSheet(){
  try{
    // no-cors: GAS POST는 redirect로 CORS 헤더가 사라지므로 응답을 읽지 않음
    // throw 없이 완료되면 시트에 전달된 것으로 간주
    const payload = JSON.stringify({
      action: 'saveSettings',
      cls: centerLevelSettings,
      fix: fcFixMap,
      pcs: projCenterSettings
    });
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: payload,
      headers: {'Content-Type': 'text/plain;charset=utf-8'},
    });
    showToast('☁️ 시트 저장 완료');
    _setSyncBadge('ok');
  } catch(e) {
    console.warn('시트 저장 실패 (로컬 유지):', e);
    showToast('⚠️ 시트 저장 실패 — 로컬에만 저장됨');
    _setSyncBadge('error');
  }
}

async function loadSettings(){
  // 1. localStorage 우선 로드 (빠른 초기화)
  try{
    const cls=localStorage.getItem('ganttCLS');
    if(cls) Object.assign(centerLevelSettings, JSON.parse(cls));
    const fix=localStorage.getItem('ganttFix');
    if(fix) Object.assign(fcFixMap, JSON.parse(fix));
    const pcs=localStorage.getItem('ganttPCS');
    if(pcs) Object.assign(projCenterSettings, JSON.parse(pcs));
  }catch(e){}

  // 2. 구글 시트에서 최신 설정 로드
  _setSyncBadge('loading');
  try{
    const res = await fetch(`${APPS_SCRIPT_URL}?action=loadSettings`, {redirect:'follow'});
    const text = await res.text();
    const data = JSON.parse(text);
    let loaded = false;
    if(data.cls) { Object.assign(centerLevelSettings, data.cls); localStorage.setItem('ganttCLS', JSON.stringify(data.cls)); loaded=true; }
    if(data.fix) { Object.assign(fcFixMap, data.fix); localStorage.setItem('ganttFix', JSON.stringify(data.fix)); loaded=true; }
    if(data.pcs) { Object.assign(projCenterSettings, data.pcs); localStorage.setItem('ganttPCS', JSON.stringify(data.pcs)); loaded=true; }
    // 시트 로드 완료 후 화면 갱신
    renderAll();
    if(document.getElementById('pageFc').classList.contains('show')) renderFcPage();
    if(document.getElementById('pageCap').classList.contains('show')) renderCapPage();
    _setSyncBadge(loaded ? 'ok' : 'warn');
    if(loaded) showToast('☁️ 시트에서 최신 설정 로드 완료');
  }catch(e){
    console.warn('시트 로드 실패, localStorage 사용:', e);
    _setSyncBadge('error');
  }
}

function copyShareLink(){
  try{
    const data = {
      cls: centerLevelSettings,
      fix: fcFixMap,
      pcs: projCenterSettings
    };
    const encoded = encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(data)))));
    const url = window.location.origin + window.location.pathname + '?s=' + encoded;
    navigator.clipboard.writeText(url).then(()=>{
      const btn = document.getElementById('shareBtn');
      const orig = btn.textContent;
      btn.textContent = '✅ 복사됨!';
      btn.style.background = '#059669';
      setTimeout(()=>{btn.textContent=orig;btn.style.background='';}, 2000);
    });
  }catch(e){ alert('복사 실패: '+e.message); }
}

function setOrder(cn, projId, order){
  const cls = getCLS(cn);
  // 같은 순서 다른 프로젝트가 있으면 교체
  Object.keys(cls.projOrder).forEach(pid=>{
    if(cls.projOrder[pid]===order && pid!==projId) delete cls.projOrder[pid];
  });
  cls.projOrder[projId] = order;
  saveSettings();
  renderFcPage();
  renderCapPage();
}

function refreshOrderButtons(cn){
  const cls = getCLS(cn);
  document.querySelectorAll('.order-btn').forEach(btn=>{
    if(btn.getAttribute('data-center')!==cn) return;
    const pid = btn.getAttribute('data-proj');
    const n = parseInt(btn.getAttribute('data-order'));
    const active = (cls.projOrder[pid]||99)===n;
    btn.style.border = '1px solid '+(active?'var(--accent)':'var(--border2)');
    btn.style.background = active?'var(--accent)':'transparent';
    btn.style.color = active?'#fff':'var(--text3)';
  });
  // 요약 카드만 재계산
  const selP=PROJECTS.filter(p=>fcSelectedProjects.has(p.id));
  renderFcSummary(selP,'fcSummaryArea');
}

function toggleFix(projId,cname,cb){
  fcFixMap[projId+'_'+cname]=cb.checked;
  saveSettings();
  renderFcPage();renderCenterPanel();
}

function updateFcInput(input){
  const pid=input.getAttribute('data-proj');
  const cn=input.getAttribute('data-c');
  const f=input.getAttribute('data-f');
  const val=Math.max(0,Math.round(parseFloat(input.value)*10)/10||0);
  getPCS(pid,cn)[f]=val;
  saveSettings();
  if(['realPersonnel','realDaily'].includes(f))renderCenterPanel();
}

  if(pageEl) pageEl.scrollTop = savedPageScroll;
  const newChipEl = document.getElementById('capMobileChipScroll');
  if(newChipEl) newChipEl.scrollLeft = savedChipScroll;
}

function buildDeadlineTimeline(selP) {
  const TODAY_ms = TODAY.getTime();
  let maxDate = new Date(TODAY);
  maxDate.setDate(maxDate.getDate() + 14);

  const rows = [];
  CENTERS.forEach(c => {
    const fixedProjs = selP.filter(p => fcFixMap[p.id+'_'+c.name]);
    if (!fixedProjs.length) return;
    const dots = [];
    fixedProjs.forEach(p => {
      const st = calcProjStatus(p, c);
      const date = st.fcDate || p.projEnd;
      if (!date) return;
      if (date > maxDate) maxDate = new Date(date);
      let dotColor;
      if (date < TODAY || st.label.includes('위험')) dotColor = '#ef4444';
      else if (st.label.includes('주의')) dotColor = '#f59e0b';
      else dotColor = '#4f7cff';
      dots.push({ date, dateStr: `${date.getMonth()+1}/${date.getDate()}`, color: dotColor });
    });
    if (dots.length) rows.push({ center: c, dots });
  });

  if (!rows.length) return '';

  const CHART_W = 280;
  const ROW_H = 46;
  const totalMs = maxDate.getTime() - TODAY_ms || 1;

  function dtX(d) {
    return Math.max(2, Math.min(CHART_W - 6, (d.getTime() - TODAY_ms) / totalMs * CHART_W));
  }

  const labelsHtml = rows.map(({ center }) =>
    `<div style="height:${ROW_H}px;display:flex;align-items:center;font-size:9px;font-weight:700;color:#4a5068;overflow:hidden;white-space:nowrap;padding-right:4px;">${center.name.replace('비버','')}</div>`
  ).join('');

  const chartRowsHtml = rows.map(({ dots }) => {
    const dotsHtml = dots.map(dot => {
      const x = dtX(dot.date);
      return `<div style="position:absolute;left:${x}px;top:0;height:${ROW_H}px;display:flex;flex-direction:column;align-items:center;justify-content:center;transform:translateX(-50%);z-index:2;">
        <div style="font-size:13px;color:${dot.color};line-height:1;">●</div>
        <div style="font-size:7px;color:${dot.color};font-weight:700;white-space:nowrap;margin-top:1px;">${dot.dateStr}</div>
      </div>`;
    }).join('');
    return `<div style="height:${ROW_H}px;position:relative;border-bottom:1px solid #f5f7fa;">
      <div style="position:absolute;left:0;right:0;top:50%;height:1px;background:#e5e7eb;margin-top:-7px;"></div>
      <div style="position:absolute;left:0;top:0;bottom:0;border-left:2px dashed #ef4444;opacity:0.7;z-index:1;"></div>
      ${dotsHtml}
    </div>`;
  }).join('');

  const axisItems = [{ x: 0, label: '오늘', red: true }];
  const cur = new Date(TODAY); cur.setDate(1); cur.setMonth(cur.getMonth() + 1);
  while (cur <= maxDate) {
    axisItems.push({ x: dtX(cur), label: `${cur.getMonth()+1}월`, red: false });
    cur.setMonth(cur.getMonth() + 1);
  }
  const axisHtml = axisItems.map(a =>
    `<div style="position:absolute;left:${a.x}px;top:2px;font-size:8px;color:${a.red?'#ef4444':'#9096b0'};font-weight:${a.red?'700':'500'};transform:translateX(-50%);white-space:nowrap;">${a.label}</div>`
  ).join('');

  return `<div style="background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 1px 8px rgba(0,0,0,.08);margin-top:8px;">
    <div style="font-size:10px;font-weight:700;color:#4a5068;letter-spacing:.04em;margin-bottom:8px;">완료 예정일 타임라인</div>
    <div style="display:flex;align-items:stretch;">
      <div style="flex-shrink:0;width:50px;">${labelsHtml}</div>
      <div style="flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;">
        <div style="position:relative;min-width:${CHART_W}px;">
          ${chartRowsHtml}
          <div style="position:relative;height:18px;margin-top:2px;">${axisHtml}</div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:12px;margin-top:8px;padding-top:6px;border-top:1px solid #f0f2f8;align-items:center;">
      <span style="font-size:8px;color:#9096b0;display:flex;align-items:center;gap:3px;"><span style="color:#ef4444;font-size:11px;">●</span>위험</span>
      <span style="font-size:8px;color:#9096b0;display:flex;align-items:center;gap:3px;"><span style="color:#f59e0b;font-size:11px;">●</span>주의</span>
      <span style="font-size:8px;color:#9096b0;display:flex;align-items:center;gap:3px;"><span style="color:#4f7cff;font-size:11px;">●</span>정상</span>
    </div>
  </div>`;
}

function renderCapPage(){
  const now=new Date();
  document.getElementById('capDate').textContent=`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 기준`;
  const selP=PROJECTS.filter(p=>fcSelectedProjects.has(p.id));
  // 모바일이면 요약 카드만 렌더
  if(window.innerWidth <= 768) { renderCapMobile(selP); return; }
  document.getElementById('capChips').innerHTML=selP.map(p=>
    `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;background:${p.bg};border:1.5px solid ${p.color};font-size:11px;font-weight:700;color:${p.tc};">
      <span style="width:6px;height:6px;border-radius:50%;background:${p.color};display:inline-block;"></span>${p.name}</span>`
  ).join('');

  let html='';
  CENTERS.forEach(c=>{
    const fixedP=selP.filter(p=>fcFixMap[p.id+'_'+c.name]);
    // 전체 상태 (픽스된 프로젝트만 기준)
    let worst={label:'미배정',color:'#9096b0',hBg:'#f9fafb',hBorder:'#e5e7eb'};
    let latestFd=null;
    fixedP.forEach(p=>{
      const st=calcProjStatus(p,c);
      if(st.fcDate&&(!latestFd||st.fcDate>latestFd))latestFd=st.fcDate;
      if(st.label.includes('위험'))worst={label:'🔴 위험',color:'#dc2626',hBg:'#fef2f2',hBorder:'#dc2626'};
      else if(st.label.includes('주의')&&!worst.label.includes('위험'))worst={label:'⚡ 주의',color:'#f59e0b',hBg:'#fffbeb',hBorder:'#f59e0b'};
      else if(st.label.includes('충분')&&!worst.label.includes('위험')&&!worst.label.includes('주의'))worst={label:'✅ 충분',color:'#059669',hBg:'#f0fdf4',hBorder:'#059669'};
      else if(st.label==='완료'&&worst.label==='미배정')worst={label:'✅ 완료',color:'#059669',hBg:'#f0fdf4',hBorder:'#059669'};
    });

    const allFixed=fixedP.length===selP.length&&selP.length>0;
    const latStr=latestFd?`최종 ${latestFd.getMonth()+1}/${latestFd.getDate()} 완료`:'';

    // 타임라인 게이지 뷰
    const capCls2 = getCLS(c.name);
    const orderedP = capCls2.mode==='sequential' ? getProjOrder(c.name, selP) : selP;
    // 타임라인 범위: 오늘 ~ 가장 늦은 마감일 또는 예상완료일 + 여유
    const allDates = selP.map(p=>p.projEnd).filter(Boolean);
    selP.forEach(p=>{
      const s=getPCS(p.id,c.name);const cRem=getCRem(c.name,p);
      const rd=s.realDaily||4;const fd=rd>0?addWorkDays(TODAY,Math.ceil(cRem/rd)):null;
      if(fd)allDates.push(fd);
    });
    const maxDate = allDates.length ? new Date(Math.max(...allDates.map(d=>d.getTime()))) : addWorkDays(TODAY, 30);
    const totalWD = Math.max(1, networkDays(TODAY, maxDate));

    // 순차일 때 누적 시작일 계산
    let seqOffset = 0; // 평일 오프셋
    const projStartOffset = {}; // projId -> 시작 평일 오프셋
    if(capCls2.mode==='sequential'){
      orderedP.forEach(p=>{
        projStartOffset[p.id] = seqOffset;
        const s=getPCS(p.id,c.name);const cRem=getCRem(c.name,p);
        const rd=s.realDaily||4;
        seqOffset += rd>0 ? Math.ceil(cRem/rd) : 0;
      });
    }

    const projRows=orderedP.map(p=>{
      const isFixed=!!fcFixMap[p.id+'_'+c.name];
      const s=getPCS(p.id,c.name);
      const cDone=Object.values(CENTER_DAILY[p.name]?.[c.name]||{}).reduce((a,b)=>a+b,0);
      const cRem=getCRem(c.name,p);
      const cTot=cDone+cRem;
      const cpct=cTot>0?Math.round(cDone/cTot*100):0;
      const opacity=isFixed?'1':'0.45';
      const rd=s.realDaily||4;
      const fcDays=rd>0?Math.ceil(cRem/rd):0;
      const startOffset = capCls2.mode==='sequential' ? (projStartOffset[p.id]||0) : 0;
      const endOffset = startOffset + fcDays;
      const startPct = Math.min(100, Math.round(startOffset/totalWD*100));
      const widthPct = Math.min(100-startPct, Math.round(fcDays/totalWD*100));
      const fcEndDate = addWorkDays(TODAY, endOffset);
      const d = p.projEnd;
      const onTime = d && fcEndDate <= d;
      const barColor = onTime ? p.color : '#dc2626';
      // 마감선 위치
      const dlPct = d ? Math.min(100, Math.round(networkDays(TODAY,d)/totalWD*100)) : null;
      const orderNum = capCls2.mode==='sequential' ? (getCLS(c.name).projOrder[p.id]||'') : '';

      const opacity2=isFixed?'1':'0.45';
      return`<div style="border-top:1px solid #e5e7eb;padding:5px 0;opacity:${opacity2};">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
          ${orderNum?`<span style="width:16px;height:16px;border-radius:50%;background:${p.color};color:#fff;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">${orderNum}</span>`:`<span style="width:8px;height:8px;border-radius:50%;background:${p.color};display:inline-block;flex-shrink:0;"></span>`}
          <span style="font-size:12px;font-weight:700;color:#1a1d2e;">${p.name}</span>
          <span style="font-size:10px;color:#4a5068;">${s.realPersonnel}명 · ${s.realDaily}건/일</span>
          ${isFixed?'':'<span style="font-size:9px;color:#9096b0;background:#f1f5f9;padding:1px 4px;border-radius:3px;">미픽스</span>'}
          <span style="margin-left:auto;font-size:11px;font-weight:700;color:${onTime?'#059669':'#dc2626'};">${fcEndDate.getMonth()+1}/${fcEndDate.getDate()} ${onTime?'✅':'🔴'}</span>
        </div>
        <!-- 게이지 타임라인 -->
        <div style="position:relative;height:14px;background:#f0f4f8;border-radius:4px;overflow:visible;">
          <!-- 예상 게이지 -->
          <div style="position:absolute;left:${startPct}%;top:0;height:100%;width:${widthPct}%;background:${barColor};opacity:.85;border-radius:4px;display:flex;align-items:center;padding-left:5px;min-width:4px;">
            ${widthPct>15?`<span style="font-size:9px;font-weight:700;color:#fff;white-space:nowrap;">${cpct}% (잔${cRem})</span>`:''}
          </div>
          <!-- 마감선 -->
          ${dlPct!==null?`<div style="position:absolute;left:${dlPct}%;top:-2px;height:calc(100% + 4px);width:2px;background:#dc2626;opacity:.8;border-radius:1px;z-index:2;"></div>`:''}
        </div>
        ${widthPct<=15?`<div style="font-size:9px;color:${p.color};font-weight:700;margin-top:1px;padding-left:${startPct}%;">${cpct}% (잔${cRem})</div>`:''}
      </div>`;
    }).join('');

    const capCls = getCLS(c.name);
    const capModeLabel = capCls.mode==='parallel'?'병행':'순차';
    const capModeColor = capCls.mode==='parallel'?'#3b6fe8':'#059669';
    html+=`<div style="background:#fff;border:2px solid ${worst.hBorder};border-radius:8px;overflow:hidden;">
      <div style="background:${worst.hBg};padding:7px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e5e7eb;">
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="width:9px;height:9px;border-radius:50%;background:${c.color};display:inline-block;"></span>
          <span style="font-size:15px;font-weight:800;color:#1a1d2e;">${c.name}</span>
          <span style="font-size:12px;font-weight:700;color:#1a1d2e;background:#f1f5f9;padding:2px 8px;border-radius:4px;">총 ${capCls.totalPersonnel}명</span>
          <span style="font-size:11px;font-weight:700;color:${capModeColor};background:${capModeColor}15;border:1px solid ${capModeColor}40;padding:2px 8px;border-radius:4px;">${capModeLabel}</span>
          ${latStr?`<span style="font-size:11px;color:#9096b0;">${latStr}</span>`:''}
        </div>
        <span style="font-size:13px;font-weight:700;color:${worst.color};">${worst.label}</span>
      </div>
      <div style="padding:6px 12px 8px;">${projRows}</div>
    </div>`;
  });
  document.getElementById('capGrid').innerHTML=html;

  // 서술형 요약
  renderCapNarrative(selP);
}

function renderCapNarrative(selP){
  const el=document.getElementById('capNarrative');
  if(!el)return;
  const issues=[];
  CENTERS.forEach(c=>{
    const fixedP=selP.filter(p=>fcFixMap[p.id+'_'+c.name]);
    fixedP.forEach(p=>{
      const st=calcProjStatus(p,c);
      if(!st.label.includes('위험')&&!st.label.includes('주의'))return;
      const s=getPCS(p.id,c.name);
      const cls=getCLS(c.name);
      const cRem=getCRem(c.name,p);
      const d=p.projEnd;
      const remWD=d?Math.max(1,networkDays(TODAY,d)):30;
      const neededDaily=Math.ceil(cRem/remWD);
      const currentDaily=s.realDaily||0;
      const dailyShort=Math.max(0,neededDaily-currentDaily);
      const currentPersonnel=s.realPersonnel||0;
      const neededPersonnel=Math.ceil(neededDaily/2);
      const personnelShort=Math.max(0,neededPersonnel-currentPersonnel);
      const dlStr=d?`${d.getMonth()+1}/${d.getDate()}`:'마감';
      const isRisk=st.label.includes('위험');
      const newDaily1=(currentPersonnel+1)*2;
      const fcDays1=newDaily1>0?Math.ceil(cRem/newDaily1):999;
      const fcDate1=fcDays1<999?addWorkDays(TODAY,fcDays1):null;
      const newDaily2=(currentPersonnel+2)*2;
      const fcDays2=newDaily2>0?Math.ceil(cRem/newDaily2):999;
      const fcDate2=fcDays2<999?addWorkDays(TODAY,fcDays2):null;
      issues.push({c,p,st,isRisk,dlStr,dailyShort,neededDaily,currentDaily,personnelShort,currentPersonnel,fcDate1,fcDate2,remWD,cRem,d});
    });
  });
  if(!issues.length){el.innerHTML='';return;}
  // 지원 가능 센터 배정 (1:1 매칭 - 중복 방지)
  const usedSupportCenters = new Set();
  issues.forEach(issue=>{
    if(!issue.personnelShort) return;
    const found = CENTERS.find(oc=>{
      if(oc.name===issue.c.name) return false;
      if(usedSupportCenters.has(oc.name)) return false; // 이미 배정됨
      if(!selP.some(op=>fcFixMap[op.id+'_'+oc.name])) return false;
      const oSt=calcProjStatus(issue.p,oc);
      return oSt.label.includes('충분')&&(oSt.daysDiff||0)>=5;
    });
    if(found){
      issue.supportCenter=found;
      usedSupportCenters.add(found.name); // 배정 완료
    } else {
      issue.supportCenter=null;
    }
  });

  const cards=issues.map(({c,p,isRisk,dlStr,dailyShort,neededDaily,currentDaily,personnelShort,currentPersonnel,fcDate1,fcDate2,supportCenter,remWD,cRem,d})=>{
    const color=isRisk?'#dc2626':'#f59e0b';
    const icon=isRisk?'🔴':'⚡';
    const bullets=[];
    if(personnelShort>0) bullets.push(`${dlStr} 마감까지 <strong>${personnelShort}명 추가 투입</strong> 필요`);
    if(dailyShort>0) bullets.push(`일별 <strong>${neededDaily}건 이상</strong> 처리 필요 (현재 ${currentDaily}건, ${dailyShort}건 추가)`);
    if(supportCenter){
      const sSt=calcProjStatus(p,supportCenter);
      bullets.push(`<strong>${supportCenter.name}</strong> 여유 ${sSt.daysDiff||0}일 — 인력 1명 지원 요청 검토 가능`);
    }
    if(fcDate1){const ok1=d&&fcDate1<=d;bullets.push(`1명 추가 시 → <strong>${fcDate1.getMonth()+1}/${fcDate1.getDate()} 완료 가능</strong>${ok1?' ✅':' (마감 초과)'}`);}
    if(fcDate2&&personnelShort>=2){const ok2=d&&fcDate2<=d;bullets.push(`2명 추가 시 → <strong>${fcDate2.getMonth()+1}/${fcDate2.getDate()} 완료 가능</strong>${ok2?' ✅':' (마감 초과)'}`);}
    return`<div style="padding:10px 14px;background:${isRisk?'#fef2f2':'#fffbeb'};border-left:4px solid ${color};border-radius:0 8px 8px 0;margin-bottom:8px;">
      <div style="font-size:13px;font-weight:800;color:${color};margin-bottom:6px;">${icon} [${c.name}] ${p.name} <span style="font-size:11px;font-weight:500;color:#4a5068;">· 잔여 ${cRem}개 · ${dlStr} 마감 · 남은 평일 ${remWD}일</span></div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        ${bullets.map(b=>`<div style="display:flex;align-items:flex-start;gap:6px;font-size:12px;color:#1a1d2e;line-height:1.5;"><span style="color:${color};font-weight:700;flex-shrink:0;">•</span><span>${b}</span></div>`).join('')}
      </div>
    </div>`;
  }).join('');
  el.innerHTML=`<div style="border-top:1px solid #e5e7eb;padding-top:10px;"><div style="font-size:13px;font-weight:800;color:#1a1d2e;margin-bottom:8px;">⚠️ 조치 필요 센터</div>${cards}</div>`;
}

const BOARD_SHEET_NAME = '태스크보드';
const BOARD_COL = {
  PROJ:0, START:1, END:2, DEPT_ID:3, DEPT_NAME:4, DDAY:5,
  ICON:6, TASK:7, NOTE:8, MEMBERS:9, TAB_GROUP:10, DONE:11
};

// 아이콘 SVG 경로
function deptSvgPath(id) {
  const paths = {
    sales: '<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>',
    dev:   '<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>',
    van:   '<path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>',
    pi:    '<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>'
  };
  return paths[id] || paths.pi;
}

// 체크 상태 (localStorage에 저장)
function getBoardChecks() {
  try { return JSON.parse(localStorage.getItem('boardChecks') || '{}'); } catch(e) { return {}; }
}
function saveBoardChecks(checks) {
  try { localStorage.setItem('boardChecks', JSON.stringify(checks)); } catch(e) {}
}

function onBoardCheck(el, key) {
  const checks = getBoardChecks();
  checks[key] = el.checked;
  saveBoardChecks(checks);
  el.closest('.task-item').classList.toggle('is-done', el.checked);
  updateCardDone(el.closest('.dept-card'));
}

function onBoardDevTabCheck(el, key) {
  const checks = getBoardChecks();
  checks[key] = el.checked;
  saveBoardChecks(checks);
  el.closest('.dev-tab-item').classList.toggle('is-done', el.checked);
  updateCardDone(el.closest('.dept-card'));
}

function updateCardDone(card) {
  const checks = [...card.querySelectorAll('.task-check')];
  const allDone = checks.length > 0 && checks.every(c => c.checked);
  card.classList.toggle('all-done', allDone);
}

function switchBoardDevTab(btn, idx) {
  const card = btn.closest('.dept-card');
  card.querySelectorAll('.dev-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  card.querySelectorAll('.dev-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
}

// 담당자 칩 렌더링 (이름(팀명) 형식 파싱)
function renderMemberChips(membersStr, colorKey) {
  if (!membersStr || !membersStr.trim()) return '';
  const colorMap = {
    blue:   { bg: 'var(--blue-avatar)',   text: 'var(--blue-text)' },
    teal:   { bg: 'var(--teal-avatar)',   text: 'var(--teal-text)' },
    teal2:  { bg: 'var(--teal2-avatar)',  text: 'var(--teal2-text)' },
    amber:  { bg: 'var(--amber-avatar)',  text: 'var(--amber-text)' },
    purple: { bg: 'var(--purple-avatar)', text: 'var(--purple-text)' },
  };

  // 개발팀은 / 로 그룹 구분
  const groups = membersStr.split(' / ');
  return groups.map((group, gi) => {
    const members = group.split(',').map(s => s.trim()).filter(Boolean);
    const ck = gi === 0 ? colorKey : (colorKey === 'teal' ? 'teal2' : colorKey);
    const c = colorMap[ck] || colorMap['blue'];
    return members.map(m => {
      const match = m.match(/^(.+?)\((.+?)\)$/);
      const name = match ? match[1] : m;
      const team = match ? match[2] : '';
      return `<div class="chip">
        <div class="avatar" style="background:${c.bg};color:${c.text}">${name.charAt(0)}</div>
        ${name}${team ? `<span class="team">${team}</span>` : ''}
      </div>`;
    }).join('');
  }).join('');
}

// 부서 카드 렌더링 (시트 데이터 기반)
function renderBoardDeptCard(deptRows, projId) {
  if (!deptRows.length) return '';
  const first    = deptRows[0];
  const deptId   = first[BOARD_COL.DEPT_ID];
  const deptName = first[BOARD_COL.DEPT_NAME];
  const dDay     = first[BOARD_COL.DDAY];   // "D-14 (05/15)" 또는 "예정"
  const iconColor = first[BOARD_COL.ICON];
  const members  = first[BOARD_COL.MEMBERS];
  const c        = iconColor;
  const checks   = getBoardChecks();

  // 탭구분 있는 행들 → 개발팀 스타일 (탭 버튼)
  const hasTabs = deptRows.some(r => r[BOARD_COL.TAB_GROUP] && r[BOARD_COL.TAB_GROUP].trim());

  // D-day 배지 색상
  const dDayIsPending = dDay === '예정';
  const dDayBadge = dDayIsPending
    ? `<span class="d-badge" style="background:var(--surface2);color:var(--text3)">예정</span>`
    : `<span class="d-badge" style="background:var(--${c}-bg);color:var(--${c}-text)">${dDay}</span>`;

  const headerHtml = (allDone) => `<div class="dept-header">
    <div class="dept-name-wrap">
      <div class="dept-icon" style="background:var(--${c}-bg);color:var(--${c}-text)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${deptSvgPath(deptId)}</svg>
      </div>
      <span class="dept-name-text">${deptName}</span>
      <span class="done-badge">최종 완료</span>
    </div>
    <div class="deadline-wrap">
      ${dDayBadge}
    </div>
  </div>`;

  if (hasTabs) {
    // 탭구분별로 그룹핑
    const tabGroups = {};
    deptRows.forEach(r => {
      const tg = r[BOARD_COL.TAB_GROUP] || '기타';
      if (!tabGroups[tg]) tabGroups[tg] = [];
      tabGroups[tg].push(r);
    });
    const tabKeys = Object.keys(tabGroups);

    const tabItems = tabKeys.map((tg, i) => {
      const key = `${projId}::${deptId}::tab::${i}`;
      const checked = !!checks[key];
      return `<div class="dev-tab-item${checked ? ' is-done' : ''}">
        <input type="checkbox" class="task-check" ${checked ? 'checked' : ''}
          onchange="onBoardDevTabCheck(this,'${key}')" onclick="event.stopPropagation()">
        <button class="dev-tab${i===0?' active':''}" onclick="switchBoardDevTab(this,${i})">${tg}</button>
      </div>`;
    }).join('');

    // 탭별 담당자 패널
    const panels = tabKeys.map((tg, i) => {
      const rows = tabGroups[tg];
      const mem = rows[0][BOARD_COL.MEMBERS] || members;
      const ck = i === 0 ? iconColor : (iconColor === 'teal' ? 'teal2' : iconColor);
      return `<div class="dev-panel${i===0?' active':''}">${renderMemberChips(mem, ck)}</div>`;
    }).join('');

    const allDone = tabKeys.some((_, i) => !!checks[`${projId}::${deptId}::tab::${i}`]);
    return `<div class="dept-card${allDone?' all-done':''}">
      ${headerHtml(allDone)}
      <div class="dev-tabs">${tabItems}</div>
      <div class="dept-persons">${panels}</div>
    </div>`;
  }

  // 일반 태스크 카드
  const tasksHtml = deptRows.map((r, i) => {
    const task = r[BOARD_COL.TASK];
    const note = r[BOARD_COL.NOTE];
    if (!task || !task.trim()) return '';
    const key = `${projId}::${deptId}::${i}`;
    const checked = !!checks[key];
    return `<div class="task-item${checked?' is-done':''}">
      <input type="checkbox" class="task-check" ${checked?'checked':''}
        onchange="onBoardCheck(this,'${key}')">
      <div class="task-body">${task}${note?`<span class="task-note">${note}</span>`:''}</div>
    </div>`;
  }).join('');

  const taskCount = deptRows.filter(r => r[BOARD_COL.TASK] && r[BOARD_COL.TASK].trim()).length;
  const doneCount = deptRows.filter((r, i) => r[BOARD_COL.TASK] && !!checks[`${projId}::${deptId}::${i}`]).length;
  const allDone = taskCount > 0 && doneCount === taskCount;
  const chipsHtml = renderMemberChips(members, iconColor);

  return `<div class="dept-card${allDone?' all-done':''}">
    ${headerHtml(allDone)}
    ${tasksHtml ? `<div class="dept-tasks">${tasksHtml}</div>` : ''}
    ${chipsHtml ? `<div class="dept-persons">${chipsHtml}</div>` : ''}
  </div>`;
}

// 프로젝트 섹션 렌더링
function renderBoardProject(projName, projRows) {
  const first = projRows[0];
  const startDate = first[BOARD_COL.START] || '';
  const endDate   = first[BOARD_COL.END]   || '';
  const periodText = startDate && endDate
    ? `${startDate} ~ ${endDate}`
    : startDate ? `${startDate} ~` : '';

  // 부서별로 그룹핑
  const deptGroups = {};
  projRows.forEach(r => {
    const did = r[BOARD_COL.DEPT_ID];
    if (!deptGroups[did]) deptGroups[did] = [];
    deptGroups[did].push(r);
  });

  const DEPT_ORDER = ['sales', 'dev', 'van', 'pi'];
  const cardsHtml = DEPT_ORDER
    .filter(did => deptGroups[did])
    .map(did => renderBoardDeptCard(deptGroups[did], projName))
    .join('');

  return `<div class="project-section" id="board-proj-${projName.replace(/\s/g,'_')}">
    <div class="project-header">
      <div class="project-name">${projName}</div>
      ${periodText ? `<span class="project-period">${periodText}</span>` : ''}
    </div>
    <div class="dept-grid">${cardsHtml}</div>
  </div>`;
}

function boardRenderAll() {

  if (!boardData.length) {
    container.innerHTML = `<div class="empty-state">
      <p>📋 태스크보드 탭에 데이터가 없습니다.<br>

  }

  // 프로젝트별 그룹핑
  const projGroups = {};
  boardData.forEach(r => {
    const pname = r['프로젝트명'].trim();
    if (!projGroups[pname]) projGroups[pname] = [];

    projGroups[pname].push([
      r['프로젝트명'] || '',

      r['마감일'] || '',
      r['부서ID'] || '',
      r['부서명'] || '',
      r['D-day'] || '예정',
      r['아이콘색'] || 'blue',
      r['태스크'] || '',
      r['태스크노트'] || '',
      r['담당자'] || '',
      r['탭구분'] || '',
      r['완료'] || 'FALSE',
    ]);
  });

  container.innerHTML = Object.entries(projGroups)
    .map(([name, rows]) => renderBoardProject(name, rows))

}
