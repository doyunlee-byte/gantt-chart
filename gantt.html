function smoothPath(pts) {
  if (pts.length < 2) return '';
  let d = `M ${pts[0].x} ${pts[0].y}`;
  for (let i = 1; i < pts.length; i++) {
    const prev = pts[i-1], curr = pts[i];
    const cpx = (prev.x + curr.x) / 2;
    d += ` C ${cpx} ${prev.y}, ${cpx} ${curr.y}, ${curr.x} ${curr.y}`;
  }
  return d;
}

async function downloadWeeklyPPT() {
  const btn = event.target;
  btn.textContent = '⏳ 생성 중...';
  btn.disabled = true;

  // ── 현재 Summary 데이터 수집
  const getProjPctLocal = (p) => {
    const tot = p.tasks.reduce((s,t)=>s+(t.total||0),0);
    const don = p.tasks.reduce((s,t)=>s+(t.done||0),0);
    return {total:tot, done:don, pct:tot>0?Math.round(don/tot*100):0};
  };
  const getRiskLocal = (p) => {
    if(!p.projEnd) return null;
    const{pct}=getProjPctLocal(p);
    const dl=Math.ceil((p.projEnd-TODAY)/86400000);
    const totD=p.projStart?Math.ceil((p.projEnd-p.projStart)/86400000):0;
    const el=totD>0?(totD-dl)/totD:0;
    if(dl<0&&pct<100)return'overdue';
    if(dl<=7&&pct<80)return'danger';
    if(el>0.6&&pct<el*80)return'warning';
    return'ok';
  };

  const todayDay=TODAY.getDay();
  const thisMonday=new Date(TODAY); thisMonday.setDate(TODAY.getDate()-(todayDay===0?6:todayDay-1));
  const thisSunday=new Date(thisMonday); thisSunday.setDate(thisMonday.getDate()+6);
  const lastMonday=new Date(thisMonday); lastMonday.setDate(thisMonday.getDate()-7);
  const lastSunday=new Date(thisMonday); lastSunday.setDate(thisMonday.getDate()-1);
  function inR(ds,from,to){const d=new Date(ds);d.setHours(0,0,0,0);return d>=from&&d<=to;}

  const totalDone=PROJECTS.reduce((s,p)=>s+p.tasks.reduce((a,t)=>a+(t.done||0),0),0);
  const totalTotal=PROJECTS.reduce((s,p)=>s+p.tasks.reduce((a,t)=>a+(t.total||0),0),0);
  const overallPct=totalTotal>0?Math.round(totalDone/totalTotal*100):0;
  const activeCount=PROJECTS.filter(p=>p.projStart&&p.projEnd&&p.projEnd>=TODAY).length;
  const riskCount=PROJECTS.filter(p=>['danger','overdue'].includes(getRiskLocal(p))).length;
  const doneCount=PROJECTS.filter(p=>{const{total,done}=getProjPctLocal(p);return total>0&&done>=total;}).length;

  const graphProj = summarySelectedProj
    ? PROJECTS.find(p=>p.id===summarySelectedProj)
    : (PROJECTS.find(p=>p.projStart&&p.projEnd)||PROJECTS[0]);

  const centerData = CENTERS.map(c=>{
    const cdata=(CENTER_DAILY[graphProj?.name]||{})[c.name]||{};
    let thisW=0,lastW=0;
    Object.entries(cdata).forEach(([ds,cnt])=>{
      if(inR(ds,thisMonday,thisSunday))thisW+=cnt;
      if(inR(ds,lastMonday,lastSunday))lastW+=cnt;
    });
    return{name:c.name,color:c.color,thisW,lastW};
  });

  const activeProjs=PROJECTS.filter(p=>{
    const{total,done}=getProjPctLocal(p);
    return p.projStart&&p.projEnd&&total>0&&done<total;
  });
  const pendingProjs=PROJECTS.filter(p=>!p.projStart||!p.projEnd);

  const payload = {
    kpis: [
      {label:'전체 진척률', value:`${overallPct}%`, sub:`${totalDone.toLocaleString()} / ${totalTotal.toLocaleString()} 매장`, alert:false},
      {label:'진행 중', value:`${activeCount}건`, sub:`총 ${PROJECTS.length}개 프로젝트`, alert:false},
      {label:'마감 위험', value:`${riskCount}건`, sub:'즉시 조치 필요', alert:riskCount>0},
      {label:'완료', value:`${doneCount}건`, sub:'100% 달성', alert:false},
    ],
    projects: activeProjs.map(p=>{
      const{total,done,pct}=getProjPctLocal(p);
      return{name:p.name,color:p.color,pct,done,total,risk:getRiskLocal(p)};
    }),
    pending: pendingProjs.map(p=>({name:p.name,color:p.color})),
    centers: centerData,
    allProjects: PROJECTS.map(p=>{
      const{total,done,pct}=getProjPctLocal(p);
      const hasDates=!!(p.projStart&&p.projEnd);
      return{
        name:p.name,color:p.color,pct,done,total,risk:getRiskLocal(p),hasDates,
        startStr:hasDates?`${p.projStart.getMonth()+1}/${p.projStart.getDate()}`:'',
        endStr:hasDates?`${p.projEnd.getMonth()+1}/${p.projEnd.getDate()}`:'',
      };
    }),
    graphProjName: graphProj?.name || '',
  };

  try {
    // Apps Script가 시트에서 직접 데이터 읽어서 슬라이드 생성
    const url = APPS_SCRIPT_URL + '?action=createSlide';
    const res = await fetch(url, {redirect:'follow'});
    const text = await res.text();
    let result;
    try { result = JSON.parse(text); } catch(e) { throw new Error(text.substring(0,200)); }
    if(result.url) {
      window.open(result.url, '_blank');
      btn.textContent = '✅ 완료!';
      setTimeout(()=>{btn.textContent='⬇ PPT 다운로드';btn.disabled=false;}, 2000);
    } else {
      throw new Error(result.error || '생성 실패');
    }
  } catch(e) {
    alert('슬라이드 생성 실패: ' + e.message);
    btn.textContent = '⬇ PPT 다운로드';
    btn.disabled = false;
  }
}

function renderSummaryPage() {
  const el = document.getElementById('summaryContainer');
  if (!el) return;
  if (!PROJECTS.length) {
    el.innerHTML = '<div style="text-align:center;padding:3rem;color:#94a3b8;">데이터 로딩 중...</div>';
    return;
  }

  // ── 날짜 범위
  const m1Start = new Date(viewYear, viewMonth, 1);
  const m2 = viewMonth+1>11?0:viewMonth+1, y2=viewMonth+1>11?viewYear+1:viewYear;
  const m2End = new Date(y2, m2+1, 0);
  const CELL_W = 26;
  const days = [];
  for(let d=new Date(m1Start);d<=m2End;d.setDate(d.getDate()+1)) days.push(new Date(d));
  const totalW = days.length * CELL_W;

  // ── 주차 범위
  const todayDay = TODAY.getDay();
  const thisMonday = new Date(TODAY); thisMonday.setDate(TODAY.getDate()-(todayDay===0?6:todayDay-1));
  const thisSunday = new Date(thisMonday); thisSunday.setDate(thisMonday.getDate()+6);
  const lastMonday = new Date(thisMonday); lastMonday.setDate(thisMonday.getDate()-7);
  const lastSunday = new Date(thisMonday); lastSunday.setDate(thisMonday.getDate()-1);
  function inRange(ds,from,to){const d=new Date(ds);d.setHours(0,0,0,0);return d>=from&&d<=to;}

  function getProjPct(p){
    const tot=p.tasks.reduce((s,t)=>s+(t.total||0),0);
    const don=p.tasks.reduce((s,t)=>s+(t.done||0),0);
    return{total:tot,done:don,pct:tot>0?Math.round(don/tot*100):0};
  }
  function getRisk(p){
    if(!p.projEnd)return null;
    const{pct}=getProjPct(p);
    const dl=Math.ceil((p.projEnd-TODAY)/86400000);
    const totD=p.projStart?Math.ceil((p.projEnd-p.projStart)/86400000):0;
    const elapsed=totD>0?(totD-dl)/totD:0;
    if(dl<0&&pct<100)return'overdue';
    if(dl<=7&&pct<80)return'danger';
    if(elapsed>0.6&&pct<elapsed*80)return'warning';
    return'ok';
  }
  const RL={
    overdue:{text:'마감 초과',color:'#ef4444'},
    danger: {text:'마감 위험',color:'#ef4444'},
    warning:{text:'주의',      color:'#f59e0b'},
    ok:     {text:'정상',      color:'#10b981'},
  };

  const isDark = document.documentElement.classList.contains('light') ? false : true;
  const bg0   = isDark ? '#0d0f1a' : '#e8ecf8';   // 전체 배경: 라이트=연보라, 다크=짙은 남색
  const bg1   = isDark ? '#181c2e' : '#ffffff';    // 카드 배경: 라이트=흰색, 다크=짙은 카드
  const bg2   = isDark ? '#1e2338' : '#f0f3fc';    // 내부 강조 배경
  const txt1  = isDark ? '#e4e8ff' : '#1a1f4e';
  const txt2  = isDark ? '#7b82b0' : '#5c6494';
  const txt3  = isDark ? '#4a5070' : '#9096b0';
  const bdr   = isDark ? 'rgba(255,255,255,.06)' : 'rgba(255,255,255,0)'; // 라이트는 border 제거 (배경으로 구분)

  // ══ 상단 KPI 카드
  const totalDone  = PROJECTS.reduce((s,p)=>s+p.tasks.reduce((a,t)=>a+(t.done||0),0),0);
  const totalTotal = PROJECTS.reduce((s,p)=>s+p.tasks.reduce((a,t)=>a+(t.total||0),0),0);
  const overallPct = totalTotal>0?Math.round(totalDone/totalTotal*100):0;
  const activeCount= PROJECTS.filter(p=>p.projStart&&p.projEnd&&p.projEnd>=TODAY).length;
  const riskCount  = PROJECTS.filter(p=>['danger','overdue'].includes(getRisk(p))).length;
  const doneCount  = PROJECTS.filter(p=>getProjPct(p).pct===100).length;

  const kpiCards = [
    {label:'전체 진척률', value:`${overallPct}%`, sub:`${totalDone.toLocaleString()} / ${totalTotal.toLocaleString()} 매장`},
    {label:'진행 중',     value:`${activeCount}건`, sub:`총 ${PROJECTS.length}개 프로젝트`},
    {label:'마감 위험',   value:`${riskCount}건`, sub:'즉시 조치 필요', alert:riskCount>0},
    {label:'완료',        value:`${doneCount}건`, sub:'100% 달성'},
  ].map(k=>`
    <div style="background:${bg1};border:none;border-radius:12px;padding:14px 18px;flex:1;min-width:100px;box-shadow:0 2px 12px rgba(80,90,180,.10);">
      <div style="font-size:10px;font-weight:600;color:${txt2};letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;">${k.label}</div>
      <div style="font-size:24px;font-weight:800;color:${k.alert?'#ef4444':txt1};letter-spacing:-.02em;line-height:1;">${k.value}</div>
      <div style="font-size:11px;color:${txt2};margin-top:6px;">${k.sub}</div>
    </div>`).join('');

  // ══ 프로젝트 진척률 (세로 막대형)
  // 완료 기준: 잔여건수(total-done) === 0
  const activeProjs = PROJECTS.filter(p=>{
    const{total,done}=getProjPct(p);
    const hasRemain = total > 0 && done < total; // 잔여건수 있음
    const hasDates = p.projStart && p.projEnd;
    return hasDates && hasRemain; // 날짜 있고 잔여건수 있는 것만
  });
  // 예정 프로젝트: 날짜 없는 것
  const pendingProjs = PROJECTS.filter(p=>!p.projStart||!p.projEnd);
  let projBars = activeProjs.map(p=>{
    const{total,done,pct}=getProjPct(p);
    const risk=getRisk(p), rl=risk?RL[risk]:null;
    const rBadge=rl&&risk!=='ok'?`<span style="font-size:9px;color:${rl.color};font-weight:700;">${rl.text}</span>`:'';
    return `<div style="display:flex;flex-direction:column;gap:6px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <div style="display:flex;align-items:center;gap:6px;min-width:0;">
          <span style="width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0;display:inline-block;"></span>
          <span style="font-size:12px;font-weight:600;color:${txt1};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</span>
          ${rBadge}
        </div>
        <span style="font-size:13px;font-weight:800;color:${p.color};flex-shrink:0;">${pct}%</span>
      </div>
      <div style="background:${bg2};border-radius:4px;height:6px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:${p.color};border-radius:4px;transition:width .4s;"></div>
      </div>
      <div style="font-size:10px;color:${txt2};">${done.toLocaleString()} / ${total.toLocaleString()}개 완료</div>
    </div>`;
  }).join('');

  // ══ 곡선 그래프
  // ══ 곡선 그래프 (다중 선택)
  if(summarySelectedProjs.size === 0) {
    const def = PROJECTS.find(p=>p.projStart&&p.projEnd)||PROJECTS[0];
    if(def) summarySelectedProjs.add(def.id);
  }
  const graphProjs = PROJECTS.filter(p=>summarySelectedProjs.has(p.id));
  const graphProj = graphProjs[0] || PROJECTS.find(p=>p.projStart&&p.projEnd) || PROJECTS[0];

  const projToggleBtns = PROJECTS.map(p=>{
    const isSel=summarySelectedProjs.has(p.id);
    return`<button onclick="selectSummaryProj('${p.id}')" style="padding:4px 10px;border-radius:6px;border:1px solid ${isSel?p.color:bdr};background:${isSel?p.color+'22':'transparent'};color:${isSel?p.color:txt2};font-size:11px;font-weight:${isSel?'700':'500'};cursor:pointer;font-family:inherit;transition:all .15s;">${p.name}</button>`;
  }).join('');

  // ══ 센터별 주간 합산 데이터 (선택 프로젝트 모두 누적)
  const weekData = {};
  CENTERS.forEach(c=>{
    let thisW=0, lastW=0;
    graphProjs.forEach(gp=>{
      const cdata=(CENTER_DAILY[gp.name]||{})[c.name]||{};
      Object.entries(cdata).forEach(([ds,cnt])=>{
        if(inRange(ds,thisMonday,thisSunday))thisW+=cnt;
        if(inRange(ds,lastMonday,lastSunday))lastW+=cnt;
      });
    });
    weekData[c.name]={thisW,lastW,color:c.color};
  });

  // ══ 색상 결정: 단일 선택=프로젝트 고유색, 다중 선택=통일 색상
  const isMultiSel = graphProjs.length > 1;
  const MULTI_COLOR = '#8b8fff'; // 다중 선택 시 통일 색상 (연보라)
  const chartColor = isMultiSel ? MULTI_COLOR : (graphProjs[0]?.color || '#6366f1');

  // ══ 전주 vs 금주 곡선 그래프 (X축=센터, Y축=건수)
  function buildWeekCompareChart(ch) {
    const svgW=580, padL=32, padR=16, padT=24, padB=28;
    const gW=svgW-padL-padR, gH=ch-padT-padB;
    const maxV=Math.max(1,...Object.values(weekData).flatMap(d=>[d.thisW,d.lastW]));
    const step=gW/Math.max(1,CENTERS.length-1);
    function xy(i,val){return{x:padL+i*step,y:padT+gH-(val/maxV)*gH};}

    let sc='';

    // Y축 격자
    [0,0.25,0.5,0.75,1].forEach(r=>{
      const y=padT+gH-r*gH;
      sc+=`<line x1="${padL}" y1="${y}" x2="${svgW-padR}" y2="${y}" stroke="${bdr}" stroke-width="${r===0?1.5:0.7}" opacity="0.6"/>`;
      if(r>0||r===0) sc+=`<text x="${padL-5}" y="${y+4}" text-anchor="end" font-size="9" fill="${txt2}">${Math.round(maxV*r)}</text>`;
    });

    const lP=CENTERS.map((c,i)=>xy(i,weekData[c.name]?.lastW||0));
    const tP=CENTERS.map((c,i)=>xy(i,weekData[c.name]?.thisW||0));

    // 금주 면적 채우기
    const fp=smoothPath(tP)+` L ${tP[tP.length-1].x} ${padT+gH} L ${padL} ${padT+gH} Z`;
    sc+=`<path d="${fp}" fill="${chartColor}" fill-opacity="0.12"/>`;

    // 전주 점선
    sc+=`<path d="${smoothPath(lP)}" fill="none" stroke="${chartColor}" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="5,3"/>`;
    // 금주 실선
    sc+=`<path d="${smoothPath(tP)}" fill="none" stroke="${chartColor}" stroke-width="3"/>`;

    // 점 + 라벨
    CENTERS.forEach((c,i)=>{
      const lp=lP[i], tp=tP[i];
      const lv=weekData[c.name]?.lastW||0, tv=weekData[c.name]?.thisW||0;
      // 전주 점 (빈 원)
      sc+=`<circle cx="${lp.x}" cy="${lp.y}" r="4" fill="${bg1}" stroke="${chartColor}" stroke-width="1.5" opacity="0.6"/>`;
      if(lv>0) sc+=`<text x="${lp.x}" y="${lp.y-9}" text-anchor="middle" font-size="9" fill="${txt2}" opacity="0.85">${lv}</text>`;
      // 금주 점 (채운 원 — 단일이면 센터색, 다중이면 통일색)
      const dotColor = isMultiSel ? MULTI_COLOR : c.color;
      sc+=`<circle cx="${tp.x}" cy="${tp.y}" r="5" fill="${dotColor}" stroke="${bg1}" stroke-width="1.5"/>`;
      if(tv>0) sc+=`<text x="${tp.x}" y="${tp.y-10}" text-anchor="middle" font-size="10" font-weight="800" fill="${dotColor}">${tv}</text>`;
      // X축 센터명
      sc+=`<text x="${tp.x}" y="${ch-1}" text-anchor="middle" font-size="10" font-weight="600" fill="${c.color}">${c.name.replace('비버','')}</text>`;
    });

    // 범례
    const legY = padT - 10;
    sc+=`<line x1="${padL}" y1="${legY}" x2="${padL+18}" y2="${legY}" stroke="${chartColor}" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>`;
    sc+=`<text x="${padL+22}" y="${legY+4}" font-size="9" fill="${txt2}">전주</text>`;
    sc+=`<line x1="${padL+52}" y1="${legY}" x2="${padL+70}" y2="${legY}" stroke="${chartColor}" stroke-width="3"/>`;
    sc+=`<text x="${padL+74}" y="${legY+4}" font-size="9" fill="${txt2}">금주</text>`;


    return `<svg width="100%" height="${ch}" viewBox="0 0 ${svgW} ${ch}" preserveAspectRatio="none">${sc}</svg>`;
  }

  const chartH = 200;
  const multiSumBadge = (() => {
    if(!isMultiSel) return '';
    const totalThis=Object.values(weekData).reduce((s,d)=>s+d.thisW,0);
    const totalLast=Object.values(weekData).reduce((s,d)=>s+d.lastW,0);
    const diff=totalThis-totalLast;
    const up=diff>=0;
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:5px 10px;background:${MULTI_COLOR}18;border-radius:8px;flex-wrap:wrap;">
      <span style="font-size:10px;font-weight:600;color:${MULTI_COLOR};">${graphProjs.map(p=>p.name).join(' + ')} 합산</span>
      <span style="font-size:11px;color:${txt2};">전주 <b style="color:${txt1};">${totalLast}</b> → 금주 <b style="color:${MULTI_COLOR};">${totalThis}</b></span>
      <span style="font-size:11px;font-weight:700;color:${up?'#10b981':'#ef4444'};">${up?'▲':'▼'}${Math.abs(diff)}</span>
    </div>`;
  })();
  const lineChart = `<div>${multiSumBadge}${buildWeekCompareChart(chartH)}</div>`;


  // 센터 증감 리스트
  let centerList=CENTERS.map(c=>{
    const{thisW,lastW}=weekData[c.name]||{};
    let diffHtml='';
    if(lastW>0){const dp=Math.round((thisW-lastW)/lastW*100);const up=dp>=0;diffHtml=`<span style="font-size:11px;font-weight:700;color:${up?'#10b981':'#ef4444'};">${up?'▲':'▼'}${Math.abs(dp)}%</span>`;}
    else if(thisW>0) diffHtml=`<span style="font-size:10px;font-weight:700;color:#10b981;">NEW</span>`;
    else diffHtml=`<span style="font-size:11px;color:${txt2};">—</span>`;
    return`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid ${bdr};">
      <div style="width:3px;height:28px;border-radius:2px;background:${c.color};flex-shrink:0;"></div>
      <span style="font-size:12px;color:${txt1};flex:1;font-weight:500;">${c.name}</span>
      <span style="font-size:11px;color:${txt2};">${lastW||0}<span style="margin:0 3px;color:${bdr};">→</span><b style="color:${txt1};">${thisW||0}</b></span>
      ${diffHtml}
    </div>`;
  }).join('');

  // ── 모바일 분기: 컴팩트 대시보드 뷰 (화이트 테마)
  if(window.innerWidth <= 768) {
    const mobBg0 = '#f5f7fa', mobBg1 = '#ffffff', mobBg2 = '#eef0f8';
    const mobTxt1 = '#1a1d2e', mobTxt2 = '#9096b0', mobBdr = '#e8ebf4';
    const mobAccent = '#4f7cff';

    // KPI 카드 1행 4열
    const kpiMob = [
      {label:'전체 진척률', value:`${overallPct}%`, sub:`${totalDone.toLocaleString()} / ${totalTotal.toLocaleString()}`},
      {label:'진행중',      value:`${activeCount}`, sub:`${PROJECTS.length}개 프로젝트`},
      {label:'마감위험',    value:`${riskCount}`,   sub:'즉시 조치', alert:riskCount>0},
      {label:'완료',        value:`${doneCount}`,   sub:'100% 달성'},
    ].map(k => `<div style="background:${mobBg1};border-radius:10px;padding:8px 8px;box-shadow:0 1px 8px rgba(0,0,0,.08);text-align:center;">
      <div style="font-size:10px;font-weight:600;color:${mobTxt2};margin-bottom:4px;white-space:nowrap;">${k.label}</div>
      <div style="font-size:20px;font-weight:800;color:${k.alert?'#ef4444':mobAccent};line-height:1;">${k.value}</div>
      <div style="font-size:9px;color:${mobTxt2};margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${k.sub}</div>
    </div>`).join('');

    // 프로젝트 칩 (그래프용)
    const mobChips = PROJECTS.map(p => {
      const isSel = summarySelectedProjs.has(p.id);
      return `<button onclick="selectSummaryProj('${p.id}')" style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:14px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0;border:1.5px solid ${isSel?p.color:'#e0e4ef'};background:${isSel?p.color+'18':'#f0f2f8'};color:${isSel?p.color:mobTxt2};">
        <span style="width:5px;height:5px;border-radius:50%;background:${p.color};display:inline-block;"></span>${p.name}</button>`;
    }).join('');

    // 프로젝트 진척도 카드 2열
    const mobProjCards = activeProjs.length ? activeProjs.map(p => {
      const {total, done, pct} = getProjPct(p);
      const risk = getRisk(p), rl = risk ? RL[risk] : null;
      return `<div style="background:${mobBg1};border-radius:10px;padding:10px 12px;box-shadow:0 1px 8px rgba(0,0,0,.08);">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;min-width:0;">
          <span style="width:6px;height:6px;border-radius:50%;background:${p.color};flex-shrink:0;display:inline-block;"></span>
          <span style="font-size:11px;font-weight:700;color:${mobTxt1};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;">${p.name}</span>
          ${rl&&risk!=='ok'?`<span style="font-size:8px;color:${rl.color};font-weight:700;flex-shrink:0;">${rl.text}</span>`:''}
        </div>
        <div style="font-size:20px;font-weight:800;color:${p.color};line-height:1;margin-bottom:5px;">${pct}%</div>
        <div style="background:${mobBg2};border-radius:3px;height:4px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:${p.color};border-radius:3px;transition:width .4s;"></div>
        </div>
      </div>`;
    }).join('') : `<div style="background:${mobBg1};border-radius:10px;padding:18px;text-align:center;color:${mobTxt2};font-size:12px;grid-column:span 2;box-shadow:0 1px 8px rgba(0,0,0,.08);">진행 중인 프로젝트 없음</div>`;

    // 센터 증감 리스트 (컴팩트)
    const mobCenterList = CENTERS.map(c => {
      const {thisW, lastW} = weekData[c.name] || {};
      let diffHtml = '';
      if(lastW>0){const dp=Math.round((thisW-lastW)/lastW*100);const up=dp>=0;diffHtml=`<span style="font-size:10px;font-weight:700;color:${up?'#10b981':'#ef4444'};">${up?'▲':'▼'}${Math.abs(dp)}%</span>`;}
      else if(thisW>0) diffHtml=`<span style="font-size:9px;font-weight:700;color:#10b981;">NEW</span>`;
      else diffHtml=`<span style="font-size:10px;color:${mobTxt2};">—</span>`;
      return `<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid ${mobBdr};">
        <div style="width:3px;height:22px;border-radius:2px;background:${c.color};flex-shrink:0;"></div>
        <span style="font-size:11px;color:${mobTxt1};flex:1;font-weight:500;">${c.name.replace('비버','')}</span>
        <span style="font-size:10px;color:${mobTxt2};">${lastW||0}<span style="margin:0 3px;color:${mobBdr};">→</span><b style="color:${mobTxt1};">${thisW||0}</b></span>
        ${diffHtml}
      </div>`;
    }).join('');

    el.innerHTML = `<div style="padding:0;display:flex;flex-direction:column;background:${mobBg0};min-height:100%;font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,sans-serif;">

      <div style="background:linear-gradient(135deg,#1a56db 0%,#3b82f6 100%);padding:12px 16px;margin-bottom:10px;">
        <div style="font-size:14px;font-weight:700;color:#fff;letter-spacing:-.2px;">Operation Center Overview</div>
      </div>

      <div style="display:flex;flex-direction:column;gap:10px;padding:0 12px 10px;">

      <!-- 프로젝트 선택 칩 (최상단) -->
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;">
        <div style="display:flex;gap:6px;">${mobChips}</div>
      </div>

      <!-- KPI 1행 4열 -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;">${kpiMob}</div>

      <!-- 프로젝트 진척도 2열 -->
      <div>
        <div style="font-size:10px;font-weight:700;color:${mobTxt2};letter-spacing:.04em;margin-bottom:7px;">프로젝트 진척도</div>
        <div class="mob-proj-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">${mobProjCards}</div>
      </div>

      <!-- 센터별 주간 비교 그래프 -->
      <div style="background:${mobBg1};border-radius:12px;padding:12px 14px;box-shadow:0 1px 8px rgba(0,0,0,.08);">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <div style="font-size:10px;font-weight:700;color:${mobTxt2};">주간 실적 비교</div>
          <div style="display:flex;align-items:center;gap:10px;font-size:9px;color:${mobTxt2};">
            <span style="display:inline-flex;align-items:center;gap:4px;"><svg width="16" height="8"><line x1="0" y1="4" x2="16" y2="4" stroke="${chartColor}" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/></svg>전주</span>
            <span style="display:inline-flex;align-items:center;gap:4px;"><svg width="16" height="8"><line x1="0" y1="4" x2="16" y2="4" stroke="${chartColor}" stroke-width="2.5"/></svg>금주</span>
          </div>
        </div>
        ${multiSumBadge}
        <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">
          <div style="min-width:480px;">${buildWeekCompareChart(160)}</div>
        </div>
        <div style="margin-top:10px;padding-top:8px;border-top:1px solid ${mobBdr};">${mobCenterList}</div>
      </div>

      </div>

    </div>`;
    return;
  }

  // ══ 하단 마감 게이지
  const monthSpans={};
  days.forEach(d=>{
    const mk=d.getFullYear()+'-'+d.getMonth();
    if(!monthSpans[mk])monthSpans[mk]={label:`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}`,count:0};
    monthSpans[mk].count++;
  });
  let monthRow='<div class="sum-month-header" style="background:'+bg1+';"><div class="sum-label-col" style="background:'+bg1+';"></div>';
  Object.values(monthSpans).forEach(ms=>monthRow+=`<div class="sum-month-cell" style="width:${ms.count*CELL_W}px;min-width:${ms.count*CELL_W}px;background:${bg1};color:${txt2};">${ms.label}</div>`);
  monthRow+='</div>';

  let dateRow='<div class="sum-header-row" style="background:'+bg1+';top:24px;"><div class="sum-label-col" style="background:'+bg1+';color:'+txt2+';">프로젝트</div>';
  days.forEach(d=>{
    const isT=fmt(d)===fmt(TODAY),isW=d.getDay()===0||d.getDay()===6;
    dateRow+=`<div class="sum-date-cell ${isT?'today':''} ${isW?'weekend':''} ${d.getDate()===1?'month-start':''}" style="min-width:${CELL_W}px;width:${CELL_W}px;color:${txt2};${isT?'color:#6366f1;font-weight:700;':''}">${d.getDate()}</div>`;
  });
  dateRow+='</div>';

  function dateToX(date){
    if(!date)return -1;
    const d=new Date(date);
    if(d<m1Start)return 0; if(d>m2End)return totalW;
    const idx=days.findIndex(x=>fmt(x)===fmt(d));
    return idx>=0?idx*CELL_W:-1;
  }
  function buildBg(){
    return days.map(d=>{
      const isT=fmt(d)===fmt(TODAY),isW=d.getDay()===0||d.getDay()===6;
      return`<div class="sum-cell-bg" style="min-width:${CELL_W}px;width:${CELL_W}px;background:${isT?'rgba(99,102,241,.06)':isW?bg2:'transparent'};border-right:1px solid ${bdr};"></div>`;
    }).join('');
  }

  let ganttRows='';
  PROJECTS.forEach(p=>{
    const risk=getRisk(p), rl=risk&&risk!=='ok'?RL[risk]:null;
    const{total,done,pct}=getProjPct(p);
    const hasDates=p.projStart&&p.projEnd;
    let bar='', pctLabel='';
    if(hasDates){
      const x1=dateToX(p.projStart),x2=dateToX(p.projEnd);
      const bw=Math.max(4,x2-x1+CELL_W);
      // 연한 배경 바
      bar=`<div style="position:absolute;left:${x1}px;width:${bw}px;height:12px;top:50%;transform:translateY(-50%);background:${p.color};opacity:.15;border-radius:4px;"></div>`;
      // 진척 바
      const progW=Math.max(0,bw*(total>0?Math.min(1,done/total):0));
      bar+=`<div style="position:absolute;left:${x1}px;width:${progW}px;height:12px;top:50%;transform:translateY(-50%);background:${p.color};border-radius:4px;"></div>`;
      // 마감 마커
      const ex=dateToX(p.projEnd);
      if(ex>=0) bar+=`<div style="position:absolute;left:${ex}px;top:4px;bottom:4px;width:2px;background:${rl?rl.color:p.color};opacity:.7;border-radius:1px;z-index:3;"></div>`;
      // % 라벨 (진척바 끝에)
      if(progW>0) pctLabel=`<div style="position:absolute;left:${x1+progW+6}px;top:50%;transform:translateY(-50%);font-size:13px;font-weight:800;color:${p.color};white-space:nowrap;z-index:5;">${pct}%</div>`;
    }
    const rBadge=rl?`<span style="font-size:9px;color:${rl.color};font-weight:700;margin-left:4px;">${rl.text}</span>`:'';
    const dText=hasDates?`<span style="font-size:10px;color:${txt2};">${p.projStart.getMonth()+1}/${p.projStart.getDate()}~${p.projEnd.getMonth()+1}/${p.projEnd.getDate()}</span>`:`<span style="font-size:10px;color:${txt2};">예정</span>`;
    if(!hasDates) return; // 예정 프로젝트는 시트에 날짜 입력 시 자동 표시
    ganttRows+=`<div class="sum-row proj-row" style="background:transparent;border-bottom:1px solid ${bdr};">
      <div class="sum-row-label proj" style="background:${bg1};cursor:default;border-right:1px solid ${bdr};">
        <span style="width:3px;height:24px;border-radius:2px;background:${p.color};display:inline-block;flex-shrink:0;margin-right:2px;"></span>
        <div style="display:flex;flex-direction:column;gap:1px;min-width:0;">
          <div style="display:flex;align-items:center;gap:4px;">
            <span style="font-size:12px;font-weight:600;color:${txt1};">${p.name}</span>${rBadge}
          </div>
          ${dText}
        </div>
      </div>
      <div class="sum-cells" style="width:${totalW}px;min-width:${totalW}px;position:relative;">
        ${buildBg()}${bar}${pctLabel}
      </div>
    </div>`;
  });

  // ══ 최종 렌더
  let pendingHtml = '';
  if(pendingProjs.length > 0) {
    const chips = pendingProjs.map(p=>'<span style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:'+bg2+';font-size:11px;color:'+txt2+';font-weight:500;"><span style="width:6px;height:6px;border-radius:50%;background:'+p.color+';display:inline-block;"></span>'+p.name+'<span style="font-size:9px;opacity:.6;margin-left:2px;">예정</span></span>').join('');
    pendingHtml = '<div style="margin-top:12px;padding-top:10px;border-top:1px solid '+bdr+'"><div style="font-size:10px;font-weight:600;color:'+txt2+';letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;">예정</div><div style="display:flex;flex-wrap:wrap;gap:6px;">'+chips+'</div></div>';
  }
  el.innerHTML=`<div style="padding:14px 18px;display:flex;flex-direction:column;gap:10px;background:${bg0};min-height:100%;font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,sans-serif;">

    <!-- 헤더 + PPT 버튼 -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
      <div style="font-size:13px;font-weight:700;color:${txt1};">📊 ProjectGantt 주간보고</div>
      <button onclick="downloadWeeklyPPT()" style="padding:7px 16px;border-radius:8px;border:none;background:#4f46e5;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">⬇ PPT 다운로드</button>
    </div>
    <!-- KPI 카드 -->
    <div style="display:flex;gap:12px;">${kpiCards}</div>

    <!-- 중단 2컬럼 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">

      <!-- 프로젝트 진척률 -->
      <div style="background:${bg1};border:none;border-radius:14px;padding:16px;box-shadow:0 2px 12px rgba(80,90,180,.10);">
        <div style="font-size:10px;font-weight:700;color:${txt2};letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;">진행 중 프로젝트</div>
        <div style="display:flex;flex-direction:column;gap:10px;">${projBars}</div>
        ${pendingHtml}
      </div>

      <!-- 센터별 설치 현황 -->
      <div style="background:${bg1};border:none;border-radius:14px;padding:16px;box-shadow:0 2px 12px rgba(80,90,180,.10);">
        <div style="font-size:11px;font-weight:700;color:${txt2};letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;">센터별 일별 실행 추이 (전주 vs 금주)</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">${projToggleBtns}</div>
        <div style="display:flex;gap:14px;align-items:flex-start;">
          <div style="flex:1;min-width:0;">${lineChart}</div>
          <div style="width:175px;flex-shrink:0;">
            <div style="font-size:10px;color:${txt2};padding-bottom:6px;border-bottom:1px solid ${bdr};margin-bottom:2px;letter-spacing:.04em;">센터 &nbsp;·&nbsp; 전주→금주 &nbsp;·&nbsp; 증감</div>
            ${centerList}
          </div>
        </div>
      </div>
    </div>

    <!-- 하단 마감 게이지 -->
    <div style="background:${bg1};border:none;border-radius:16px;overflow:hidden;box-shadow:0 2px 16px rgba(80,90,180,.10);">
      <div style="padding:14px 20px;font-size:11px;font-weight:700;color:${txt2};letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid ${bdr};">예상 마감 일정</div>
      <div style="overflow-x:auto;">
        <div class="sum-wrap">${monthRow}${dateRow}${ganttRows}</div>
      </div>
    </div>
  </div>`;
}
</script>
<div class="toast" id="toast"></div>
</body>
</html>
